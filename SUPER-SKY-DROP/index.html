                customLevels.push(newSave);
                editingCustomIndex = customLevels.length - 1;
            }
            localStorage.setItem('superSkyDropCustom', JSON.stringify(customLevels));
        }

        function startCustomLevel(level) {
            isCustomLevel = true;
            isEndlessMode = false;
            isSecretStage = false;
            isNewRecord = false;
            editorLevel = level;
            resetGame();
            gameState = 'PLAYING';
        }

        function checkHighScore() {
            let recordId = isEndlessMode ? 'endless' : (isSecretStage ? 'secret' : currentLevelIndex);
            let currentBest = highScores[recordId] || 0;
            let currentVal = isEndlessMode ? Math.floor(endlessTime) : Math.floor(distance);
            
            if (currentVal > currentBest) {
                highScores[recordId] = currentVal;
                localStorage.setItem('superSkyDropHighScores', JSON.stringify(highScores));
                isNewRecord = true;
                return true;
            }
            return false;
        }

        function resetGame() {
            stopAllSounds();
            isNewRecord = false;

            // 内部的には 1m = 3.6ユニット として扱う (100m/秒 の表示速度を実現するため)
            const METER_SCALE = 3.6;
            if (isCustomLevel && editorLevel) {
                goalDistance = (editorLevel.totalDist || 4000) * METER_SCALE;
                distance = (editorLevel.startDist || 0) * METER_SCALE;
                player.x = (editorLevel.startX !== undefined) ? editorLevel.startX : (canvas.width / 2 - player.width / 2);
                editorLevel.objects.forEach(o => o.spawned = (o.d * METER_SCALE < distance));
            } else {
                goalDistance = 4000 * METER_SCALE; // 14400 units
                player.x = canvas.width / 2 - player.width / 2;
                distance = 0;
            }
            
            lastSpawnDistance = 0; 
            lastSecretSpawnDistance = 0;
            seed = 1; // 常に乱数の種を1からスタートさせる

            player.y = 150;
            obstacles = [];
            particles = [];
            goal = null;
            score = 0;
            endlessTime = 0;
            starsSpawned = 0;
            starsCollected = 0;
            currentCoins = [false, false, false];
            isPracticeUsed = isSlowMode; // スローモード使用中なら練習済みとみなす
            introTimer = isIntroEnabled ? 1.0 : 0;
            lightningAlpha = 0; 
            lastSecretPathX = canvas.width / 2 - 50; 
            lastSecretSpawnDistance = -200; 
            
            if (isCustomLevel) {
                speedMultiplier = editorLevel.speed || 1.0;
                let bgmTypes = ['pop', 'techno', 'chill'];
                currentBGMType = bgmTypes[editorLevel.bgmType || 0];
                seed = 999;
            } else if (isEndlessMode) {
                let randomBgIdx = Math.floor(Math.random() * backgroundThemes.length);
                let bgmTypes = ['pop', 'techno', 'chill'];
                currentBGMType = bgmTypes[Math.floor(Math.random() * bgmTypes.length)];
                seed = Math.floor(Math.random() * 88888);
                speedMultiplier = levels[2].speed;
            } else if (isSecretStage) {
                seed = 77777; // 裏ステージ専用シード
                speedMultiplier = baseSpeedMultiplier;
            } else {
                seed = 12345 + currentLevelIndex;
                speedMultiplier = baseSpeedMultiplier;
            }
            
            gameState = 'PLAYING';
            playIntroWindSound();
            playIngameBGM();
        }

        function spawnObstacle() {
            if (isSecretStage) {
                // 隠しステージ：左右に大きな壁があり、一箇所だけ道がある（極限の狭い道）
                const pathWidth = 36; // 自機(30px)に対して左右3pxずつの余裕しかない超極狭
                
                // 道が急に飛びすぎないようにする（極限の道に合わせて移動幅をさらにタイトに）
                let shift = (seededRandom() - 0.5) * 60; 
                let pathX = lastSecretPathX + shift;
                
                // 画面端の制限
                if (pathX < 5) pathX = 5;
                if (pathX > canvas.width - pathWidth - 5) pathX = canvas.width - pathWidth - 5;
                
                lastSecretPathX = pathX; // 次回の基準にする
                
                // 不思議な幻のステージの色（時間で変化）
                let hue = (Date.now() / 15) % 360;
                let wallColor = `hsl(${hue}, 80%, 45%)`;
                
                // 左の巨大な壁
                obstacles.push({
                    x: 0, 
                    y: canvas.height + 50,
                    width: pathX, 
                    height: 40, // 少し薄くして通りやすく
                    color: wallColor,
                    type: 'secret',
                    vx: 0,
                    active: true
                });
                // 右の巨大な壁
                obstacles.push({
                    x: pathX + pathWidth, 
                    y: canvas.height + 50,
                    width: canvas.width - (pathX + pathWidth), 
                    height: 40, // 少し薄くして通りやすく
                    color: wallColor,
                    type: 'secret',
                    vx: 0,
                    active: true
                });
                return;
            }

            if (isCustomLevel) {
                // 自作ステージ：配置済みデータから指定距離に現れたらスポーン
                for (let obj of editorLevel.objects) {
                    if (!obj.spawned && distance >= obj.d - canvas.height) {
                        obj.spawned = true;
                        // スポーン時のy座標を、現在のdistanceとの差分に基づいて調整（150pxの基準点で完全同期）
                        let spawnY = 150 + obj.d - distance;
                        
                        if (obj.type === 'goal') {
                            goal = {
                                x: obj.x, y: spawnY,
                                width: obj.w, height: obj.h,
                                color: '#2ECC71'
                            };
                        } else {
                            obstacles.push({
                                x: obj.x, y: spawnY,
                                width: obj.w, height: obj.h,
                                color: obj.color, type: obj.type,
                                rotation: obj.rotation || 0,
                                vx: (obj.type === 'moving' ? 2 : 0),
                                active: true, timer: 0
                            });
                        }
                    }
                }
                return;
            }

            if (!isEndlessMode && distance > goalDistance - 300) return; 

            // レベルに応じて出現する種類を増やす
            let possibleTypes = ['normal'];
            if (currentLevelIndex >= 5) possibleTypes.push('fast');
            if (currentLevelIndex >= 9) possibleTypes.push('large');
            if (currentLevelIndex >= 14) possibleTypes.push('moving');
            
            // 第3章の限定ギミック
            if (currentLevelIndex >= 42) {
                possibleTypes.push('laser');
                possibleTypes.push('seeker');
            }
            if (currentLevelIndex >= 45) {
                possibleTypes.push('blackhole');
            }

            // ボスステージの特別調整
            if (levels[currentLevelIndex].isBossStage) {
                let isRush = levels[currentLevelIndex].isBossRush;
                let activeBoss = 1;
                if (isRush) {
                    if (distance < 1300) activeBoss = 1;
                    else if (distance < 2600) activeBoss = 2;
                    else activeBoss = 3;
                } else {
                    activeBoss = currentChapter;
                }

                // 倍率設定
                let diffMulti = isRush ? 1.3 : 1.0; 

                // ボス（魔術師）は魔法の弾を放つ
                if (seededRandom() < 0.25 * diffMulti) {
                    playFireSound();
                    let fx = seededRandom() * (canvas.width - 40);
                    let fy = canvas.height;
                    let dx = (player.x + player.width/2) - (fx + 20);
                    let dy = (player.y + player.height/2) - (fy + 20);
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let speed = (seededRandom() * 1.5 + 2.5) * (isRush ? 1.2 : 1.0);
                    obstacles.push({
                        x: fx, y: fy,
                        width: 40, height: 40,
                        type: 'fireball', color: '#ff4400',
                        vx: (dx / dist) * speed,
                        vy: (dy / dist) * speed,
                        active: true, timer: 0
                    });
                }
                // 雷ボール
                if (seededRandom() < 0.2 * diffMulti) {
                    obstacles.push({
                        x: seededRandom() * (canvas.width - 60),
                        y: canvas.height + 60,
                        width: 60, height: 60,
                        type: 'thunderball',
                        rotation: 0, rotSpeed: (0.08 + seededRandom() * 0.05) * (isRush ? 1.5 : 1.0),
                        vx: (seededRandom() - 0.5) * 1.5 * (isRush ? 1.2 : 1.0),
                        active: true, timer: 0
                    });
                }
                // 3章ボス (またはボスラッシュのボス3) は紫レーザーも
                if (activeBoss === 3 && seededRandom() < (0.05 * diffMulti)) {
                    obstacles.push({
                        x: seededRandom() * (canvas.width - 80),
                        y: 0,
                        width: 80, height: canvas.height,
                        type: 'bossLaser', color: '#9B59B6',
                        active: true, timer: 0,
                        state: 'warning',
                        warningTimer: isRush ? 45 : 60
                    });
                }
                
                // ボスラッシュ専用: プテラノドン
                if (isRush && seededRandom() < 0.04) {
                    obstacles.push({
                        x: player.x, // プレイヤーの現在x座標を狙う
                        y: -40, // 画面上部から
                        width: 30, height: 30,
                        type: 'pteranodon',
                        active: true,
                        warningTimer: 60 // 1秒間点線
                    });
                }

                return;
            }

            // ランダムに種類を選ぶ
            let selectedType = possibleTypes[Math.floor(seededRandom() * possibleTypes.length)];
            
            // 普通の赤い障害物の出現率を高めに調整
            if (seededRandom() < 0.5) {
                selectedType = 'normal';
            }

            // 20%の確率で「端っこ封じ」の壁を作る
            if (seededRandom() < 0.2) {
                const wallWidth = seededRandom() * 40 + 60; // 60-100px
                const isLeft = seededRandom() < 0.5;
                obstacles.push({
                    x: isLeft ? 0 : canvas.width - wallWidth,
                    y: canvas.height + 50,
                    width: wallWidth,
                    height: 30,
                    color: '#34495E',
                    type: 'large',
                    vx: 0,
                    active: true
                });
                return;
            }

            let type = 'normal';
            let vx = 0;
            let color = '#E74C3C'; // 赤: 普通
            let sizeX = seededRandom() * 60 + 20;
            let sizeY = 20;

            if (selectedType === 'moving') {
                type = 'moving';
                color = '#9B59B6'; // 紫: 左右に動く
                vx = seededRandom() > 0.5 ? 2 : -2;
                sizeX = seededRandom() * 40 + 30;
            } else if (selectedType === 'large') {
                type = 'large';
                color = '#34495E'; // ダークグレー: 大きくて避けにくい
                sizeX = seededRandom() * 80 + 80;
                sizeY = 30;
            } else if (selectedType === 'fast') {
                type = 'fast';
                color = '#E67E22'; // オレンジ: 細くて速い
                sizeX = seededRandom() * 20 + 20;
                sizeY = 50;
            } else if (selectedType === 'gear') {
                type = 'gear';
                color = '#7F8C8D'; // グレー: 回転する歯車
                sizeX = 60;
                sizeY = 60;
            } else if (selectedType === 'spiky') {
                type = 'spiky';
                color = '#2C3E50'; // 深い青: 棘付き
                sizeX = 50;
                sizeY = 50;
            } else if (selectedType === 'diagonal') {
                type = 'diagonal';
                color = '#8E44AD'; // 紫: 斜め
                sizeX = 140; // 斜めの長さ
                sizeY = 20;  // 斜めの太さ
            } else if (selectedType === 'laser') {
                type = 'laser';
                color = '#E74C3C'; // 赤: レーザー
                sizeX = 20;
                sizeY = canvas.height * 2; // 長い
            } else if (selectedType === 'laserH') {
                type = 'laserH';
                color = '#E74C3C';
                sizeX = canvas.width;
                sizeY = 20;
            } else if (selectedType === 'seeker') {
                type = 'seeker';
                color = '#3498DB'; // 青: 追跡者
                sizeX = 30;
                sizeY = 30;
            } else if (selectedType === 'blackhole') {
                type = 'blackhole';
                color = '#2c3e50';
                sizeX = 80;
                sizeY = 80;
            } else if (selectedType === 'warpgate') {
                // ワープゲートは必ずペアで生成
                let x1 = seededRandom() * (canvas.width / 2 - 60) + 20;
                let x2 = seededRandom() * (canvas.width / 2 - 60) + canvas.width / 2 + 20;
                let yGate = canvas.height + 50;
                let gateID = distance + seededRandom(); // Date.now()をdistanceに置換
                
                obstacles.push({
                    x: x1, y: yGate, width: 40, height: 60,
                    type: 'warpgate', color: '#3498DB', active: true,
                    targetX: x2 + 20, targetY: yGate + 30, pairID: gateID, timer: 0
                });
                obstacles.push({
                    x: x2, y: yGate, width: 40, height: 60,
                    type: 'warpgate', color: '#9B59B6', active: true,
                    targetX: x1 + 20, targetY: yGate + 30, pairID: gateID, timer: 0
                });
                return;
            }

            // 出現位置
            let x;
            if (selectedType === 'gear') {
                x = seededRandom() * (canvas.width - 100) + 50; // 少し中央寄り
            } else {
                let posRand = seededRandom();
                if (posRand < 0.15) {
                    x = 0; // 左端
                } else if (posRand < 0.3) {
                    x = canvas.width - sizeX; // 右端
                } else {
                    x = seededRandom() * (canvas.width - sizeX);
                }
            }

            obstacles.push({
                x: x, y: canvas.height + 50, width: sizeX, height: sizeY,
                type: type, color: color, vx: vx,
                rotation: type === 'diagonal' ? (seededRandom() > 0.5 ? Math.PI/4 : -Math.PI/4) : 0, 
                rotSpeed: type === 'gear' ? 0.1 : 0, 
                active: true, explodeTimer: -1,
                timer: 0 // レーザーやシーカー用
            });
        }
        
        function spawnPteranodon() {
            let px = seededRandom() * (canvas.width - 40) + 20;
             obstacles.push({
                x: px, y: -100, width: 30, height: 30,
                type: 'pteranodon', color: '#8b4513',
                warningTimer: 60, // 1秒(60FPS)
                active: true, timer: 0
            });
        }

        function spawnStar(coinIndex) {
            // 星の配置を右か左かランダムに決める（シード値使用）
            let isLeft = seededRandom() > 0.5;
            let starX = isLeft ? 12 : canvas.width - 12 - 26;

            // コイン（星）本体
            obstacles.push({
                x: starX,
                y: canvas.height + 50,
                width: 26,
                height: 26,
                color: '#F1C40F',
                type: 'item',
                coinIndex: coinIndex,
                vx: 0
            });

            // コインの周りをブロックで囲み、難しい「狭い道」と安全な「広い道」の分岐を作る
            if (isLeft) {
                // 左が狭い道(幅50px)、右が広い道(幅160px)のパターン
                obstacles.push({
                    x: 50,
                    y: canvas.height + 50,
                    width: 150,             // 真ん中を塞ぐ大きな壁
                    height: 20,
                    color: '#34495E',
                    type: 'large',
                    vx: 0
                });
                obstacles.push({
                    x: 360,
                    y: canvas.height + 50,
                    width: 40,              // 右端の壁
                    height: 20,
                    color: '#34495E',
                    type: 'large',
                    vx: 0
                });
            } else {
                // 右が狭い道(幅50px)、左が広い道(幅160px)のパターン
                obstacles.push({
                    x: 0,
                    y: canvas.height + 50,
                    width: 40,              // 左端の壁
                    height: 20,
                    color: '#34495E',
                    type: 'large',
                    vx: 0
                });
                obstacles.push({
                    x: 200,
                    y: canvas.height + 50,
                    width: 150,             // 真ん中を塞ぐ大きな壁
                    height: 20,
                    color: '#34495E',
                    type: 'large',
                    vx: 0
                });
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1,
                    color: color
                });
            }
        }

        function changePlayerName() {
            let newName = prompt("新しい名前を入力してください（10文字以内）:", playerName);
            if (newName && newName.trim() !== "") {
                playerName = newName.trim().substring(0, 10);
                localStorage.setItem('superSkyDropPlayerName', playerName);
                alert(`名前を「${playerName}」に変更しました！`);
            }
        }

        function update() {
            // エンドレスモードの通知チェック
            let isReadyNow = (Date.now() - lastEndlessPlayTime >= 30 * 60 * 1000);
            if (isReadyNow && !wasEndlessReady) {
                endlessNotificationTimer = 120; // 約2秒
            }
            wasEndlessReady = isReadyNow;
            if (endlessNotificationTimer > 0) endlessNotificationTimer--;

            // クリック地点の消去タイマー
            if (lastClickTime > 0 && Date.now() - lastClickTime > 1000) {
                lastClickTime = 0;
            }
            // パーティクルの更新（GAMEOVERやCLEAR状態でも動き続ける）
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02; 
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // プレイヤーのトレイル（軌跡）の更新
            for (let i = playerTrail.length - 1; i >= 0; i--) {
                playerTrail[i].life -= 0.05;
                if (playerTrail[i].life <= 0) {
                    playerTrail.splice(i, 1);
                }
            }

            let timeFactor = isSlowMode ? slowModeStrength : 1.0;
            // 雲の移動（背景演出）も常に動かす。スローの時は背景も遅くする
            let scrollSpeed = (gameState === 'PLAYING' ? speedMultiplier * timeFactor : baseSpeedMultiplier * 0.5);
            for (let i = 0; i < clouds.length; i++) {
                clouds[i].y -= clouds[i].speedY * scrollSpeed;
                if (clouds[i].y + clouds[i].height < 0) {
                    clouds[i].y = canvas.height + 50;
                    clouds[i].x = Math.random() * canvas.width;
                }
            }
            
            // 星の移動（背景演出）
            for (let i = 0; i < bgStars.length; i++) {
                bgStars[i].y -= bgStars[i].speedY * scrollSpeed;
                bgStars[i].alpha += (Math.random() - 0.5) * 0.1;
                if (bgStars[i].alpha < 0) bgStars[i].alpha = 0;
                if (bgStars[i].alpha > 1) bgStars[i].alpha = 1;
                if (bgStars[i].y + bgStars[i].size < 0) {
                    bgStars[i].y = canvas.height + 10;
                    bgStars[i].x = Math.random() * canvas.width;
                }
            }

            if (globalOpeningInvincibility > 0) globalOpeningInvincibility--;

            if (gameState === 'PRE_OPENING') return;

            if (gameState === 'OPENING') {
                openingTimerValue--;
                if (openingTimerValue <= 0) {
                    gameState = 'START';
                    playLevelSelectBGM();
                }
                return;
            }

            if (gameState !== 'PLAYING') {
                return;
            }

            timeFactor = (isSlowMode && !isEndlessMode) ? slowModeStrength : 1.0;
            let currentFrameSpeedMultiplier = speedMultiplier * timeFactor;

            if (introTimer > 0) {
                introTimer -= 0.016; // 60FPS想定で約1秒で0に
                if (introTimer <= 0) {
                    startIngameWind(); // ズームが完了したらプレイ領域の環境音を開始
                }
                return; // ムービー中はゲームを進行させない
            }

            // プレイヤーの新しいトレイルを追加 (線にするためより細かく記録)
            playerTrail.push({
                x: player.x + player.width / 2,
                y: player.y + player.height / 2,
                distance: distance,
                life: 1.0
            });
            
            // トレイルが溜まりすぎないよう制限 (滑らかさのために長めに保持、2.5倍に強化)
            if (playerTrail.length > 150) {
                playerTrail.shift();
            }

            // チャプターの自動更新
            currentChapter = Math.floor(currentLevelIndex / 20) + 1;

            // ボスステージ1の雷演出
            if (!isCustomLevel && levels[currentLevelIndex].isBossStage && currentChapter === 1) {
                if (Math.random() < 0.02) lightningAlpha = 0.8;
                lightningAlpha *= 0.9;
            }

            // プレイヤーの左右移動
            let isMoving = false;
            let targetRotation = 0;
            if (keys.ArrowLeft && player.x > 0) {
                player.x -= player.speed * timeFactor;
                isMoving = true;
                targetRotation = -0.15; // 左に少し傾ける
            }
            if (keys.ArrowRight && player.x < canvas.width - player.width) {
                player.x += player.speed * timeFactor;
                isMoving = true;
                targetRotation = 0.15; // 右に少し傾ける
            }
            
            // 傾きを滑らかに補間
            player.rotation += (targetRotation - player.rotation) * 0.1;
            
            updateMoveWindParams(isMoving);


            let scrollInc = 6.0 * currentFrameSpeedMultiplier;
            distance += scrollInc;

            if (isEndlessMode) {
                endlessTime += 0.016; 
                score = Math.floor(endlessTime * 100); // 秒間100mペース
                obsSpawnRate += 0.00001 * timeFactor; 
                if (obsSpawnRate > 0.1) obsSpawnRate = 0.1; 
            } else {
                score = Math.floor(distance / 3.6);
            }

            screenShake *= 0.85;
            if (screenShake < 0.1) screenShake = 0;

            // 出現条件の定義
            let canSpawn = isEndlessMode || (distance < goalDistance);

            // 障害物・スター出現判定（安全装置付き絶対マイルストーン方式）
            // フリーズを100%防ぐため回数制限付きのforループに修正
            let stepsNeeded = Math.floor((distance - lastSpawnDistance) / 10);
            stepsNeeded = Math.min(stepsNeeded, 20); // 1フレーム最大20ステップまでに制限
            
            for (let s = 0; s < stepsNeeded; s++) {
                lastSpawnDistance += 10;
                let currentPos = Math.round(lastSpawnDistance);

                // コイン/スターの出現判定
                if (!isCustomLevel && !isEndlessMode) {
                    if (currentPos > goalDistance * 0.25 - 5 && currentPos < goalDistance * 0.25 + 5 && starsSpawned === 0) { spawnStar(0); starsSpawned = 1; }
                    else if (currentPos > goalDistance * 0.5 - 5 && currentPos < goalDistance * 0.5 + 5 && starsSpawned === 1) { spawnStar(1); starsSpawned = 2; }
                    else if (currentPos > goalDistance * 0.75 - 5 && currentPos < goalDistance * 0.75 + 5 && starsSpawned === 2) { spawnStar(2); starsSpawned = 3; }
                }

                // 障害物の出現判定 (80mごと)
                if (currentPos % 80 === 0) {
                    let isSafeZone = !isEndlessMode && (
                        (currentPos > goalDistance * 0.25 - 100 && currentPos < goalDistance * 0.25 + 100) ||
                        (currentPos > goalDistance * 0.5 - 100 && currentPos < goalDistance * 0.5 + 100) ||
                        (currentPos > goalDistance * 0.75 - 100 && currentPos < goalDistance * 0.75 + 100)
                    );

                    if (!isCustomLevel && !isSafeZone) {
                        // 出現率に基づいた判定を復活
                        let spawnChance = levels[currentLevelIndex].rate * 4.5;
                        if (seededRandom() < spawnChance) {
                            spawnObstacle();
                        }
                        
                        // ボスラッシュ時の特殊出現
                        if (levels[currentLevelIndex].isBossRush && seededRandom() < 0.1) {
                            spawnPteranodon();
                        }
                    }
                }

                // 隠しステージ用の130m間隔処理
                if (isSecretStage && currentPos - lastSecretSpawnDistance >= 130) {
                    spawnObstacle();
                    lastSecretSpawnDistance = currentPos;
                }
            }

            if (canSpawn && isCustomLevel) {
                 spawnObstacle(); // カスタムレベル（エディタ製）は従来通り
            }

            if (!isEndlessMode && distance >= goalDistance && !goal) {
                goal = {
                    x: 0, 
                    y: canvas.height + 100,
                    width: canvas.width,
                    height: 100,
                    color: '#2ECC71',
                    paraScale: 0 // パラシュートの開き具合 (0 to 1)
                };
            }

            if (goal) {
                if (goal.paraScale < 1) goal.paraScale += 0.05 * currentFrameSpeedMultiplier;
                if (goal.y > canvas.height - 100) {
                   goal.y -= 6.0 * currentFrameSpeedMultiplier; 
                } else {
                    player.y += 3 * timeFactor;
                }
                
                if (
                    player.x < goal.x + goal.width &&
                    player.x + player.width > goal.x &&
                    player.y + player.height >= goal.y &&
                    player.y <= goal.y + goal.height
                ) {
                    gameState = 'CLEAR';
                    playerTrail = []; // 負荷軽減：クリア時にクリア
                    stopAllSounds();
                    playClearSound(); // クリア音を再生
                    
                    if (isPracticeUsed || isCustomLevel) {
                        // 練習モードまたは自作ステージクリア時は報酬なし
                        lastSilverBirdsEarned = 0;
                        lastClearHadBoost = false;
                    } else {
                        // 裏ステージクリア報酬：イケメンの目
                        if (currentLevelIndex === 60 && !isHandsomeEyesUnlocked) {
                             isHandsomeEyesUnlocked = true;
                             localStorage.setItem('superSkyDropHandsUnlocked', 'true');
                             alert("★クリアおめでとうございます！★\n「イケメンの目」をゲットしました！着替え室から装備できます。");
                        }

                        // 通常クリア報酬（銀の鳥コイン）の計算と付与
                        lastClearHadBoost = coinBoostMultiplier > 1;
                        
                        // 公式レベル：レベルの数字（1-20）× 100 ポイントにする
                        let baseBirds = ((currentLevelIndex % 20) + 1) * 100;
                        
                        let starBonus = starsCollected * 50; // 星1つにつき50枚
                        lastSilverBirdsEarned = Math.floor((baseBirds + starBonus) * coinBoostMultiplier);
                        if (isNaN(lastSilverBirdsEarned)) lastSilverBirdsEarned = 0;
                        totalSilverBirds += lastSilverBirdsEarned;
                        
                        if (coinBoostMultiplier > 1) {
                            lastBoostPercent = Math.round((coinBoostMultiplier - 1) * 100);
                            coinBoostMultiplier = 1.0; // ボーナス消費
                        }

                        // 獲得したコインの記録を保存する（公式ステージのみ）
                        if (!savedCoins[currentLevelIndex]) {
                            savedCoins[currentLevelIndex] = [false, false, false];
                        }
                        for (let c = 0; c < 3; c++) {
                            if (currentCoins[c]) {
                                savedCoins[currentLevelIndex][c] = true;
                            }
                        }
                        localStorage.setItem('superSkyDropCoins', JSON.stringify(savedCoins));
                        saveShopData();
                    }

                    createParticles(player.x + player.width/2, player.y + player.height, '#2ECC71');
                    checkHighScore(); // クリア時もハイスコアチェック
                } else if (player.y > canvas.height) {
                    playerTrail = []; // 負荷軽減
                    triggerGameOver();
                    createParticles(player.x + player.width/2, player.y, '#E74C3C');
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                let collided = false; // Moved declaration here
                let moveSpeed = 6.0 * currentFrameSpeedMultiplier;
                if (obs.type === 'fast') {
                    moveSpeed = 10.0 * currentFrameSpeedMultiplier;
                }
                obs.y -= moveSpeed;

                if (obs.type === 'gear' || obs.type === 'thunderball') {
                    obs.rotation += obs.rotSpeed * timeFactor;
                }
                if (obs.type === 'thunderball') {
                    obs.timer += 0.15 * timeFactor;
                    obs.x += obs.vx * timeFactor;
                    if (obs.x < 0) { obs.x = 0; obs.vx *= -1; }
                    else if (obs.x + obs.width > canvas.width) { obs.x = canvas.width - obs.width; obs.vx *= -1; }
                }

                if (obs.type === 'laser' || obs.type === 'laserH' || obs.type === 'bossLaser') {
                    // アニメーション用のタイマーを更新
                    obs.timer += 0.1 * timeFactor;
                    
                    if (obs.type === 'bossLaser') {
                        if (obs.state === 'warning') {
                            // 第3章ボスの紫レーザー：予告線のカウントダウン
                            obs.warningTimer -= timeFactor;
                            if (obs.warningTimer <= 0) {
                                obs.state = 'active';
                                obs.timer = 0; // 発射開始
                            }
                        } else {
                            // 発射中。一定時間が経過したら無効化して消去（約1.5秒）
                            if (obs.timer > 10.0) {
                                obs.active = false;
                            }
                        }
                    }

                    if (obs.state !== 'warning') {
                        let laserWide = Math.max(0.1, (obs.type === 'bossLaser' ? Math.sin(obs.timer * 4) : Math.sin(obs.timer * 3)) + 1) / 2;
                        if (laserWide > 0.6) {
                            // 視覚的な太さに合わせて判定も伸縮させる
                            let lW = obs.width * laserWide;
                            let lX = obs.x + (1 - laserWide) * (obs.width / 2);
                            if (player.x + pMarginX < lX + lW &&
                                player.x + player.width - pMarginX > lX &&
                                player.y + pMarginY < obs.y + obs.height &&
                                player.y + player.height - pMarginY > obs.y) {
                                collided = true;
                            }
                        }
                    }
                }
                
                if (obs.type === 'fireball') {
                    obs.y += (obs.vy || 0) * timeFactor;
                    obs.x += (obs.vx || 0) * timeFactor;
                    obs.timer += 0.1 * timeFactor;
                }

                if (obs.type === 'blackhole') {
                    obs.timer += 0.1 * timeFactor;
                    // 引力 (絶対的な安全計算)
                    let dx = (obs.x + obs.width/2) - (player.x + player.width/2);
                    let dy = (obs.y + obs.height/2) - (player.y + player.height/2);
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    // 距離が近すぎる（10px以内）か、数値が壊れている場合は吸引を停止
                    if (isFinite(dist) && dist < 200 && dist > 10) {
                        let force = ((200 - dist) / 100) * timeFactor;
                        let moveX = (dx / dist) * force;
                        let moveY = (dy / dist) * force;
                        
                        // 計算結果が正常な時だけ移動を適用
                        if (isFinite(moveX) && isFinite(moveY)) {
                            player.x += moveX;
                            player.y += moveY;
                        }
                    }
                }

                // (重複していたプテラノドン処理を統合整理)
                if (obs.type === 'pteranodon') {
                    if (obs.warningTimer > 0) {
                        obs.warningTimer -= timeFactor;
                    } else {
                        obs.y += 18 * timeFactor; 
                    }
                }
                
                if (obs.type === 'moving') {
                    obs.x += obs.vx * (speedMultiplier > 0.5 ? speedMultiplier : 1) * timeFactor;
                    if (obs.x < 0) {
                        obs.x = 0;
                        obs.vx *= -1;
                    } else if (obs.x + obs.width > canvas.width) {
                        obs.x = canvas.width - obs.width;
                        obs.vx *= -1;
                    }
                }

                // 画面外、または寿命が尽きた(active=false)障害物を削除
                // （上へ抜けるもの、下へ抜けるプテラノドン両方確実に消去する）
                if (obs.y < -canvas.height-200 || obs.y > canvas.height + 1000 || obs.active === false) {
                    obstacles.splice(i, 1);
                    continue;
                }

                const pMarginX = 0; // 当たり判定を少し狭くして、ギリギリを通りやすくする（Hの場所を狭くする）
                const pMarginY = 0; 

                // 起動時の2.5秒間、またはイントロ中、または開始直後は当たり判定を無効にする
                if (globalOpeningInvincibility > 0 || introTimer > 0 || distance < 100) {
                    collided = false;
                } else if (obs.type === 'gear') {
                    // 円形判定（中心点からの距離）
                    let dx = (player.x + player.width / 2) - (obs.x + obs.width / 2);
                    let dy = (player.y + player.height / 2) - (obs.y + obs.height / 2);
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 26) collided = true;
                } else if (obs.type === 'thunderball') {
                    // 雷ボール（円形判定）
                    let dx = (player.x + player.width / 2) - (obs.x + obs.width / 2);
                    let dy = (player.y + player.height / 2) - (obs.y + obs.height / 2);
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 28) collided = true;
                } else if (obs.type === 'diagonal') {
                    // 斜め棒判定: 5点でサンプリング
                    for (let step = 0; step <= 1; step += 0.2) {
                        let rx = obs.x + obs.width / 2 + (step - 0.5) * obs.width * Math.cos(obs.rotation);
                        let ry = obs.y + obs.height / 2 + (step - 0.5) * obs.width * Math.sin(obs.rotation);
                        if (rx > player.x && rx < player.x + player.width &&
                            ry > player.y && ry < player.y + player.height) {
                            collided = true;
                            break;
                        }
                    }
                } else if (obs.type === 'spiky') {
                    // 棘付き
                    if (player.x < obs.x + obs.width &&
                        player.x + player.width > obs.x &&
                        player.y < obs.y + obs.height + 5 &&
                        player.y + player.height > obs.y - 5) {
                        collided = true;
                    }
                } else if (obs.type === 'laser' || obs.type === 'laserH' || obs.type === 'bossLaser') {
                    if (obs.type === 'bossLaser' && obs.state === 'warning') {
                        // 予告線中は当たり判定なし
                    } else {
                        let laserWide = (obs.type === 'bossLaser') ? (Math.sin(obs.timer * 4) + 1) / 2 : (Math.sin(obs.timer * 3) + 1) / 2;
                        if (laserWide > 0.5) {
                            if (obs.type === 'laser' || obs.type === 'bossLaser') {
                                let lW = obs.width * laserWide;
                                let lX = obs.x + (1 - laserWide) * (obs.width / 2);
                                if (player.x < lX + lW && player.x + player.width > lX &&
                                    player.y < obs.y + obs.height && player.y + player.height > obs.y) {
                                    collided = true;
                                }
                            } else if (obs.type === 'laserH') {
                                let lH = obs.height * laserWide;
                                let lY = obs.y + (1 - laserWide) * (obs.height / 2);
                                if (player.x < obs.x + obs.width && player.x + player.width > obs.x &&
                                    player.y < lY + lH && player.y + player.height > lY) {
                                    collided = true;
                                }
                            }
                        }
                    }
                } else if (obs.type === 'blackhole') {
                    // 重心に近いと死亡
                    let dx = (player.x + player.width / 2) - (obs.x + obs.width / 2);
                    let dy = (player.y + player.height / 2) - (obs.y + obs.height / 2);
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 25) collided = true;
                } else if (obs.type === 'seeker') {
                    // 追跡者は通常の矩形判定
                    if (player.x < obs.x + obs.width &&
                        player.x + player.width > obs.x &&
                        player.y < obs.y + obs.height &&
                        player.y + player.height > obs.y) {
                        collided = true;
                    }
                } else if (obs.type === 'fireball') {
                    let dx = (player.x+player.width/2) - (obs.x+obs.width/2);
                    let dy = (player.y+player.height/2) - (obs.y+obs.height/2);
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 20) collided = true; 
                } else if (obs.type === 'pteranodon') {
                    if (obs.warningTimer <= 0) { // 警告中は当たり判定なし
                        if (player.x < obs.x + obs.width && player.x + player.width > obs.x && player.y < obs.y + obs.height && player.y + player.height > obs.y) collided = true;
                    }
                } else if (obs.type === 'item') {
                    let dx = (player.x+player.width/2) - (obs.x+obs.width/2);
                    let dy = (player.y+player.height/2) - (obs.y+obs.height/2);
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 24) collided = true;
                } else {
                    if (player.x < obs.x + obs.width &&
                        player.x + player.width > obs.x &&
                        player.y < obs.y + obs.height &&
                        player.y + player.height > obs.y) {
                        collided = true;
                    }
                }

                // オープニング中は当たり判定を無効化
                if (gameState === 'OPENING' || introTimer > 0) {
                    collided = false;
                }

                if (collided) {
                    if (obs.type === 'item') {
                        starsCollected++;
                        if (obs.coinIndex !== undefined && !isEndlessMode) currentCoins[obs.coinIndex] = true;
                        createParticles(obs.x + obs.width / 2, obs.y + obs.height / 2, '#F1C40F');
                        obstacles.splice(i, 1); continue;
                    } else {
                        if (isEndlessMode) {
                            lastClearHadBoost = coinBoostMultiplier > 1;
                            let baseReward = Math.floor(endlessTime) * 5;
                            let starReward = starsCollected * 50;
                            lastSilverBirdsEarned = Math.floor((baseReward + starReward) * coinBoostMultiplier);
                            totalSilverBirds += (lastSilverBirdsEarned || 0);
                            if (coinBoostMultiplier > 1) {
                                lastBoostPercent = 30; // Assuming 30% is a default boost for endless mode
                                coinBoostMultiplier = 1.0;
                                saveShopData();
                            }
                        }
                        playerTrail = []; triggerGameOver();
                        createParticles(player.x + player.width / 2, player.y + player.height / 2, '#FF5733');
                    }
                }
            }

            // 最終安全装置：プレイヤーの座標が異常(NaNなど)になったら瞬時に修復してフリーズを防ぐ
            if (!isFinite(player.x) || !isFinite(player.y)) {
                player.x = canvas.width / 2 - player.width / 2;
                player.y = 150;
                console.error("座標異常を検知：修復しました");
            }
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x + player.width/2, player.y + player.height/2);
            if (isTiltEnabled) ctx.rotate(player.rotation);
            if (isDebugHitboxEnabled && gameState !== 'OPENING') {
                ctx.strokeStyle = 'red'; ctx.lineWidth = 2; ctx.strokeRect(-player.width/2, -player.height/2, player.width, player.height);
            }
            ctx.translate(-player.width/2, -player.height/2);

            let mColor = mantleColors[equippedMantle] || mantleColors.default;
            let mPattern = mantlePatterns[equippedMantle] || 'none';
            
            // パラシュート時の変数計算
            let scale = goal ? (goal.paraScale || 0) : 0;
            let time = Date.now() / 200;
            let swayX = scale > 0 ? Math.sin(time) * (7 * scale) : 0;
            let paraW = player.width + (30 * scale);
            let paraY = (-40 * scale) + Math.cos(time) * (2 * scale);

            // マント・パラシュート描画
            ctx.save();
            if (goal) {
                // パラシュート演出 (着地中)
                // 腕 (arms) - パラシュートを掴んでいる感じ
                if (scale > 0.5) {
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    // 左腕
                    ctx.moveTo(5, 5); ctx.lineTo(player.width/2 + swayX - paraW/2 + 5, paraY + 5);
                    // 右腕
                    ctx.moveTo(player.width - 5, 5); ctx.lineTo(player.width/2 + swayX + paraW/2 - 5, paraY + 5);
                    ctx.stroke();
                }

                // パラシュート本体 (変形アニメーション)
                ctx.translate(player.width/2 + swayX, paraY);
                ctx.beginPath(); 
                if (scale < 0.3) {
                    // まだマントに近い形
                    ctx.moveTo(-15 * (1-scale), 0); ctx.lineTo(15 * (1-scale), 0);
                    ctx.lineTo(20 * (1-scale), -10); ctx.lineTo(-20 * (1-scale), -10);
                } else {
                    // パラシュートの形へ
                    ctx.arc(0, 0, paraW/2, Math.PI, 0); 
                    ctx.quadraticCurveTo(paraW/4, 8 * scale, 0, 0);
                    ctx.quadraticCurveTo(-paraW/4, 8 * scale, -paraW/2, 0);
                }
                ctx.closePath();
                ctx.clip();
                ctx.fillStyle = mColor; ctx.fill();
            } else {
                // 通常のマント - プレイ中のみ激しく揺れる。
                let time = Date.now() / 80;
                let vY = 0; let vX = 0;
                let sway1 = Math.sin(time) * 12;
                let sway2 = Math.cos(time * 0.8) * 8;
                
                if (gameState === 'PLAYING') {
                    vY = 10 + sway1 + (Math.random() * 5);
                    vX = sway2 + (Math.random() - 0.5) * 6;
                } else if (gameState !== 'OPENING') {
                    // 通常時（タイトル等）はゆったり
                    vY = Math.sin(Date.now() / 200) * 5;
                    vX = Math.cos(Date.now() / 250) * 3;
                }
                
                // よりダイナミックなマントの形状
                ctx.beginPath(); 
                ctx.moveTo(3, 0); 
                // 左端
                ctx.quadraticCurveTo(-10 + vX, -10 - vY * 0.5, -18 + vX * 1.2, -28 - vY); 
                // 中央（たわみ）
                ctx.quadraticCurveTo(player.width/2 + vX * 0.5, -20 - vY * 0.7, player.width + 18 + vX * 1.2, -28 - vY); 
                // 右端
                ctx.quadraticCurveTo(player.width + 10 + vX, -10 - vY * 0.5, player.width - 3, 0); 
                ctx.closePath(); 
                
                ctx.save();
                ctx.clip();
                ctx.fillStyle = mColor;
                ctx.fill();
                
                // マントに深みを出すためのグラデーション
                let mGrad = ctx.createLinearGradient(0, 0, 0, -30 - vY);
                mGrad.addColorStop(0, 'rgba(0,0,0,0)');
                mGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
                ctx.fillStyle = mGrad;
                ctx.fill();
                ctx.restore();
            }
            if (mPattern === 'stripe') {
                ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 4;
                for (let si = -40; si < player.width + 20; si += 10) { ctx.beginPath(); ctx.moveTo(si, -40); ctx.lineTo(si + 40, 10); ctx.stroke(); }
            } else if (mPattern === 'rainbow') {
                let rwGrad = ctx.createLinearGradient(0, -25, player.width, 0);
                rwGrad.addColorStop(0, 'red'); rwGrad.addColorStop(0.5, 'yellow'); rwGrad.addColorStop(1, 'violet');
                ctx.fillStyle = rwGrad; ctx.fillRect(-20, -40, player.width + 40, 50);
            } else if (mPattern === 'dot') {
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                for(let dx=-10; dx<player.width+20; dx+=15) for(let dy=-30; dy<10; dy+=15) { ctx.beginPath(); ctx.arc(dx, dy, 4, 0, Math.PI*2); ctx.fill(); }
            } else if (mPattern === 'check') {
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                for(let cx=-20; cx<player.width+20; cx+=10) for(let cy=-40; cy<10; cy+=10) { if (Math.floor((cx+20)/10 + (cy+40)/10)%2===0) { ctx.fillRect(cx, cy, 10, 10); } }
            } else if (mPattern === 'star') {
                ctx.fillStyle = 'rgba(255,255,150,0.8)';
                for(let sx=-10; sx<player.width+20; sx+=20) for(let sy=-30; sy<10; sy+=20) {
                    ctx.beginPath();
                    for(let pi=0; pi<10; pi++){ let a=pi*Math.PI/5-Math.PI/2; let r2=pi%2===0?6:2.5; if(pi===0) ctx.moveTo(sx+Math.cos(a)*r2, sy+Math.sin(a)*r2); else ctx.lineTo(sx+Math.cos(a)*r2, sy+Math.sin(a)*r2); }
                    ctx.closePath(); ctx.fill();
                }
            }
            ctx.restore();

            let skinId = equippedSkin;
            if (skinId === 'chrome') {
                let cg = ctx.createLinearGradient(0,0,player.width,player.height); cg.addColorStop(0,'#fff'); cg.addColorStop(0.5,'#a9a9a9'); cg.addColorStop(1,'#708090'); ctx.fillStyle = cg;
            } else if (skinId === 'gold_metal') {
                let gg = ctx.createLinearGradient(0,0,player.width,player.height); gg.addColorStop(0,'#ffd700'); gg.addColorStop(1,'#8b6914'); ctx.fillStyle = gg;
            } else { ctx.fillStyle = player.color; }

            ctx.beginPath();
            if (equippedShape === 'circle') { ctx.arc(player.width/2, player.height/2, player.width/2, 0, Math.PI*2); }
            else if (equippedShape === 'star') {
                for(let i=0; i<10; i++){ let a=i*Math.PI/5-Math.PI/2; let r=i%2===0?player.width/2:player.width*0.25; if(i===0) ctx.moveTo(player.width/2+Math.cos(a)*r, player.height/2+Math.sin(a)*r); else ctx.lineTo(player.width/2+Math.cos(a)*r, player.height/2+Math.sin(a)*r); } ctx.closePath();
            } else if (equippedShape === 'triangle') {
                ctx.moveTo(player.width/2, 0); ctx.lineTo(player.width, player.height); ctx.lineTo(0, player.height); ctx.closePath();
            } else if (equippedShape === 'diamond') {
                ctx.moveTo(player.width/2, 0); ctx.lineTo(player.width, player.height/2); ctx.lineTo(player.width/2, player.height); ctx.lineTo(0, player.height/2); ctx.closePath();
            } else { ctx.roundRect(0, 0, player.width, player.height, 5); }
            ctx.fill();

            // 目の位置の計算 (パラシュート時は上を見る)
            let baseEyeY = (equippedShape === 'triangle') ? 22 : 15;
            let eyeY = baseEyeY - (scale * 8); 
            if (equippedEyes === 'handsome') {
                // イケメンの目：キリッとした鋭い目
                ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(4, eyeY+4); ctx.lineTo(12, eyeY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(18, eyeY); ctx.lineTo(26, eyeY+4); ctx.stroke();
                ctx.fillStyle = '#00f'; ctx.fillRect(7, eyeY+2, 4, 4); ctx.fillRect(19, eyeY+2, 4, 4);
            } else {
                ctx.fillStyle = 'white'; ctx.fillRect(5, eyeY, 8, 8); ctx.fillRect(17, eyeY, 8, 8);
                ctx.fillStyle = 'black'; ctx.fillRect(7, eyeY + 3, 4, 4); ctx.fillRect(19, eyeY + 3, 4, 4);
            }
            ctx.restore();
        }

        function drawHorrorBoss(ctx, chapter) {
            ctx.save();
            let centerX = canvas.width / 2;
            let baseY = canvas.height + 15; // 画面内にしっかり収めるため少し上げる
            let time = Date.now() * 0.001;
            let shakeX = Math.sin(time * 12) * 5; 
            let shakeY = Math.cos(time * 8) * 3;

            ctx.translate(shakeX, shakeY);

            if (chapter === 1) {
                // 第一の恐怖：赤鬼 (提供されたイメージに基づく、より詳細なデザイン)
                
                // 後ろの髪（黒い鬣）
                ctx.fillStyle = '#17202A';
                ctx.beginPath();
                ctx.moveTo(centerX - 130, baseY + 100);
