            let actX = canvas.width - 75;
            ctx.fillStyle = '#E67E22'; ctx.fillRect(actX, canvas.height - 145, 65, 35);
            ctx.fillStyle = 'white'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('テスト', actX + 32.5, canvas.height - 125);
            ctx.fillStyle = '#95a5a6'; ctx.fillRect(actX, canvas.height - 105, 65, 35); ctx.fillText('終了', actX + 32.5, canvas.height - 85);
            
            ctx.fillStyle = 'white'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText(`距離: ${Math.floor(editorScroll)}m`, 10, 20);
            ctx.textAlign = 'right';
            ctx.fillText(`目標距離 (全長): ${TOTAL}m`, canvas.width - 10, 20);
            ctx.textAlign = 'left';
        }


        // ====== ランキング通信機能 ======
        // GASとの通信は「URLパラメーター付きのGET」で行う（CORS回避のため）
        async function sendScore(name, scoreVal) {
            if (!RANKING_GAS_URL) return;
            try {
                // GASへはGETリクエストにパラメーターをつけて送信（CORS問題を回避）
                let url = RANKING_GAS_URL + 
                    '?action=post' +
                    '&name=' + encodeURIComponent(name) + 
                    '&score=' + encodeURIComponent(scoreVal);
                // no-corsモードで送るだけ（レスポンスは読めないが保存はされる）
                await fetch(url, { mode: 'no-cors' });
                console.log("Score sent: " + name + " / " + scoreVal);
            } catch (e) {
                console.error("Failed to send score:", e);
            }
        }

        function fetchRanking() {
            if (!RANKING_GAS_URL) {
                worldRankingData = [{name: "設定待ち", score: 0}];
                isRankingLoading = false;
                draw();
                return;
            }
            isRankingLoading = true;
            // JSONPでデータを取得（CORSを回避）
            window.__rankingCallback = function(data) {
                worldRankingData = data;
                isRankingLoading = false;
                document.getElementById('gasJsonpScript')?.remove();
                draw();
            };
            let script = document.createElement('script');
            script.id = 'gasJsonpScript';
            script.onerror = function() {
                console.error('JSONP failed');
                worldRankingData = [{name: "取得失敗", score: 0}];
                isRankingLoading = false;
                document.getElementById('gasJsonpScript')?.remove();
                draw();
            };
            // GASにcallback=__rankingCallbackをつけてJSONP形式で要求
            script.src = RANKING_GAS_URL + '?action=get&callback=__rankingCallback';
            document.head.appendChild(script);
        }

        function drawRanking() {
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ヘッダー
            ctx.fillStyle = 'white';
            ctx.font = 'bold 28px "Righteous", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('WORLD RANKING', canvas.width/2, 80);
            ctx.font = 'bold 14px sans-serif';
            ctx.fillStyle = '#F1C40F';
            ctx.fillText('ENDLESS MODE SURVIVAL', canvas.width/2, 105);

            // 戻るボタン
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.beginPath(); ctx.roundRect(10, 10, 80, 35, 5); ctx.fill();
            ctx.fillStyle = 'white'; ctx.font = '14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('戻る', 50, 33);

            // リスト表示
            ctx.textAlign = 'left';
            if (isRankingLoading) {
                ctx.fillStyle = 'white';
                ctx.fillText('読み込み中...', canvas.width/2 - 40, canvas.height/2);
            } else {
                let startY = 150;
                for (let i = 0; i < Math.min(worldRankingData.length, 10); i++) {
                    let r = worldRankingData[i];
                    let y = startY + i * 42;
                    
                    // 背景 (グラデーションっぽく)
                    let rowAlpha = (i < 3) ? (0.35 - i*0.1) : 0.08;
                    ctx.fillStyle = (i === 0) ? `rgba(241, 196, 15, ${rowAlpha})` : 
                                   (i === 1) ? `rgba(189, 195, 199, ${rowAlpha})` :
                                   (i === 2) ? `rgba(230, 126, 34, ${rowAlpha})` : `rgba(255,255,255,${rowAlpha})`;
                    
                    ctx.beginPath();
                    ctx.roundRect(20, y - 28, canvas.width - 40, 36, 6);
                    ctx.fill();

                    // 順位
                    ctx.fillStyle = (i === 0) ? '#F1C40F' : (i === 1) ? '#BDC3C7' : (i === 2) ? '#E67E22' : 'white';
                    ctx.font = 'bold 20px "Righteous", sans-serif';
                    ctx.fillText(`${i + 1}`, 35, y);

                    // 名前
                    ctx.font = '16px sans-serif';
                    ctx.fillStyle = 'white';
                    ctx.fillText(r.name || "---", 85, y);

                    // スコア
                    ctx.textAlign = 'right';
                    ctx.font = 'bold 22px "Righteous", sans-serif';
                    ctx.fillStyle = '#F1C40F';
                    ctx.fillText(`${r.score}秒`, canvas.width - 35, y);
                    ctx.textAlign = 'left';
                }
                
                if (!RANKING_GAS_URL) {
                    ctx.fillStyle = '#E74C3C';
                    ctx.font = '12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('※GAS連携設定が未完了です', canvas.width/2, canvas.height - 50);
                }
            }
        }

        function draw() {
            updateBackgroundColors();
            
            ctx.save();
            // 画面全体を揺らす
            if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
            }
            
            // 背景の描画 (隠しステージ用の特別背景)
            if (isSecretStage && gameState === 'PLAYING') {
                let sGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                sGrad.addColorStop(0, '#000000');
                sGrad.addColorStop(0.5, '#1a0d2d');
                sGrad.addColorStop(1, '#000000');
                ctx.fillStyle = sGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // 幻想的な粒子をたまに描画
                if (Math.random() < 0.1) {
                    ctx.fillStyle = `hsl(${Math.random()*360}, 100%, 70%)`;
                    ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
                }
            } else {
                // 通常の背景描画 (補間された色でグラデーションを作成)
                let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            let c1 = [...currentBgColors.c1];
            let c2 = [...currentBgColors.c2];
            let c3 = [...currentBgColors.c3];
            
            // ボス戦限定の特別背景
            if (levels[currentLevelIndex].isBossStage) {
                if (currentChapter === 1) {
                    // 雷雨: 暗くし、たまに光らせる
                    c1 = [30 + (lightningAlpha * 100), 30 + (lightningAlpha * 100), 50 + (lightningAlpha * 150)];
                    c2 = [100 + (lightningAlpha * 50), 100 + (lightningAlpha * 50), 150 + (lightningAlpha * 70)];
                    c3 = [150 + (lightningAlpha * 30), 150 + (lightningAlpha * 30), 200 + (lightningAlpha * 40)];
                } else if (currentChapter === 2) {
                    // 嵐: ダークレッドとパープルが混ざったような不気味な空
                    c1 = [50, 0, 0];
                    c2 = [80, 20, 50];
                    c3 = [100, 40, 80];
                } else if (currentChapter === 3) {
                    // 悪魔の星: 深い紫と黒
                    c1 = [15, 0, 25];
                    c2 = [30, 0, 50];
                    c3 = [50, 0, 80];
                }
            }

            bgGrad.addColorStop(0, `rgb(${Math.floor(c1[0])}, ${Math.floor(c1[1])}, ${Math.floor(c1[2])})`);
            bgGrad.addColorStop(0.5, `rgb(${Math.floor(c2[0])}, ${Math.floor(c2[1])}, ${Math.floor(c2[2])})`);
                bgGrad.addColorStop(1, `rgb(${Math.floor(c3[0])}, ${Math.floor(c3[1])}, ${Math.floor(c3[2])})`);
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            if (!isCustomLevel && levels[currentLevelIndex].isBossStage && currentChapter === 1 && lightningAlpha > 0.1) {
                ctx.fillStyle = `rgba(255, 255, 255, ${lightningAlpha * 0.3})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 背景の星を描画
            for (let star of bgStars) {
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            for (let cloud of clouds) {
                ctx.beginPath();
                ctx.roundRect(cloud.x, cloud.y, cloud.width, cloud.height, 20);
                ctx.fill();
            }

            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            if (gameState === 'PLAYING' && introTimer <= 0) {
                let currentFrameSpeedMultiplier = speedMultiplier * (isSlowMode ? slowModeStrength : 1.0);
                // スピード感のある風のライン
                for (let i=0; i<8; i++) {
                    let lx = Math.random() * canvas.width;
                    let ly = Math.random() * canvas.height;
                    let len = 40 + Math.random() * 60;
                    ctx.globalAlpha = 0.1 + Math.random() * 0.3;
                    ctx.fillRect(lx, ly, 1.5, len * currentFrameSpeedMultiplier);
                }
                ctx.globalAlpha = 1.0;
            }

            if (gameState === 'PLAYING' || gameState === 'CLEAR' || gameState === 'GAMEOVER') {
                ctx.save();
                
                // ズームアウト演出のカメラ設定
                if (introTimer > 0 && gameState === 'PLAYING') {
                    let ease = introTimer * introTimer * introTimer; // キュッとズームアウトさせる
                    let scale = 1 + (ease * 4); // 最初は5倍の大きさ
                    let px = player.x + player.width / 2;
                    let py = player.y + player.height / 2;
                    
                    ctx.translate(canvas.width / 2, canvas.height / 2); // 画面中央へ
                    ctx.scale(scale, scale); // ズーム
                    ctx.translate(-px, -py); // プレイヤーを中心に合わせる
                }

                if (goal) {
                    // 1. 土レイヤー (深い茶色)
                    ctx.fillStyle = '#6D4C41'; 
                    ctx.fillRect(goal.x, goal.y + 10, goal.width, goal.height - 10);
                    
                    // 2. 草レイヤー (ベースは控えめに)
                    ctx.fillStyle = '#82E0AA'; 
                    ctx.fillRect(goal.x, goal.y + 12, goal.width, 10);
                    
                    // 3. 風で揺れる細長い草 (まばらに描画)
                    ctx.strokeStyle = '#27AE60';
                    ctx.lineWidth = 2;
                    let time = Date.now() / 1000;
                    for (let gx = 10; gx < canvas.width; gx += 25) {
                        let sway = Math.sin(time * 3 + gx) * 8; // 左右に揺れる量
                        ctx.beginPath();
                        ctx.moveTo(gx, goal.y + 15);
                        // ベジェ曲線や単純な線で細長く描く
                        ctx.quadraticCurveTo(gx + sway * 0.5, goal.y + 5, gx + sway, goal.y - 12);
                        ctx.stroke();
                        
                        // ついでに小さな葉っぱ
                        ctx.fillStyle = '#27AE60';
                        ctx.beginPath();
                        ctx.ellipse(gx + sway, goal.y - 12, 3, 1.5, Math.PI/4, 0, Math.PI*2);
                        ctx.fill();
                    }
                    
                    // 4. 花を描画 (草の合間にまばらに)
                    let flowerColors = ['#E74C3C', '#F1C40F', '#9B59B6', '#3498DB', '#FFFFFF'];
                    for (let fi = 0; fi < 15; fi++) {
                        let fx = (fi * 27.5 + 5) % canvas.width;
                        let sway = Math.sin(time * 3 + fx) * 4;
                        let fy = goal.y + 10;
                        ctx.fillStyle = flowerColors[fi % flowerColors.length];
                        ctx.beginPath();
                        ctx.arc(fx + sway, fy - 5, 3, 0, Math.PI * 2);
                        ctx.fill();
                        // 茎
                        ctx.strokeStyle = '#1E8449';
                        ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(fx + sway, fy - 5); ctx.lineTo(fx, fy + 5); ctx.stroke();
                    }

                    // 5. 従来の「H」マーク
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 36px "Righteous", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('H', goal.x + goal.width/2, goal.y + 55); 
                    ctx.textAlign = 'left';
                }

                for (let obs of obstacles) {
                    if (obs.active === false) continue; // 修正：!obs.activeだとundefined(通常ブロック)まで飛ばされてしまう
                    ctx.save();
                    
                    if (obs.type === 'thunderball') {
                        // 雷ボール: 青白色の電球
                        ctx.translate(obs.x + obs.width/2, obs.y + obs.height/2);
                        ctx.rotate(obs.rotation);
                        // 光るオーラ
                        let pulse = (Math.sin(obs.timer * 6) + 1) / 2;
                        let tbGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, obs.width/2);
                        tbGrad.addColorStop(0, `rgba(255, 255, 255, ${0.8 + pulse * 0.2})`);
                        tbGrad.addColorStop(0.3, `rgba(150, 220, 255, ${0.7 + pulse * 0.3})`);
                        tbGrad.addColorStop(0.7, `rgba(50, 100, 255, ${0.5})`);
                        tbGrad.addColorStop(1, `rgba(0, 0, 100, 0)`);
                        ctx.fillStyle = tbGrad;
                        ctx.beginPath();
                        ctx.arc(0, 0, obs.width/2, 0, Math.PI*2);
                        ctx.fill();
                        // 雷のスパーク
                        ctx.strokeStyle = `rgba(200, 240, 255, ${0.4 + pulse * 0.6})`;
                        ctx.lineWidth = 1.5;
                        for (let si = 0; si < 6; si++) {
                            let ang = (si / 6) * Math.PI * 2 + obs.timer;
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            let zigX = Math.cos(ang) * obs.width/2 * 0.4;
                            let zigY = Math.sin(ang) * obs.width/2 * 0.4;
                            ctx.lineTo(zigX + (Math.random()-0.5)*6, zigY + (Math.random()-0.5)*6);
                            ctx.lineTo(Math.cos(ang) * obs.width/2, Math.sin(ang) * obs.width/2);
                            ctx.stroke();
                        }
                        
                    } else if (obs.type === 'gear') {
                        ctx.translate(obs.x + obs.width/2, obs.y + obs.height/2);
                        ctx.rotate(obs.rotation);
                        
                        let gearGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, obs.width/2);
                        gearGrad.addColorStop(0, '#bdc3c7');
                        gearGrad.addColorStop(1, '#7f8c8d');
                        ctx.fillStyle = gearGrad;
                        
                        for (let i = 0; i < 12; i++) {
                            ctx.rotate(Math.PI / 6);
                            ctx.fillRect(-obs.width/8, -obs.height/2 - 2, obs.width/4, obs.height/4);
                        }
                        ctx.beginPath();
                        ctx.arc(0, 0, obs.width/2.5, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#2c3e50';
                        ctx.beginPath();
                        ctx.arc(0, 0, obs.width/6, 0, Math.PI*2);
                        ctx.fill();
                        
                    } else if (obs.type === 'laser' || obs.type === 'laserH') {
                        let laserWide = (Math.sin(obs.timer * 3) + 1) / 2;
                        ctx.globalAlpha = 0.2 + (laserWide * 0.8);
                        let lGrad;
                        if (obs.type === 'laser') {
                            lGrad = ctx.createLinearGradient(obs.x, 0, obs.x + obs.width, 0);
                        } else {
                            lGrad = ctx.createLinearGradient(0, obs.y, 0, obs.y + obs.height);
                        }
                        lGrad.addColorStop(0, '#ff0000');
                        lGrad.addColorStop(0.5, '#ffffff');
                        lGrad.addColorStop(1, '#ff0000');
                        ctx.fillStyle = lGrad;
                        
                        if (obs.type === 'laser') {
                            ctx.fillRect(obs.x + (1 - laserWide) * (obs.width / 2), obs.y, obs.width * laserWide, obs.height);
                        } else {
                            ctx.fillRect(obs.x, obs.y + (1 - laserWide) * (obs.height / 2), obs.width, obs.height * laserWide);
                        }
                        ctx.globalAlpha = 1.0;
                        
                        ctx.fillStyle = '#333';
                        if (obs.type === 'laser') ctx.fillRect(obs.x - 5, obs.y, obs.width + 10, 10);
                        else ctx.fillRect(obs.x, obs.y - 5, 10, obs.height + 10);
                        
                    } else if (obs.type === 'blackhole') {
                        ctx.translate(obs.x + obs.width/2, obs.y + obs.height/2);
                        ctx.rotate(obs.timer || 0);
                        // 軽量化した渦描画
                        for (let i = 0; i < 3; i++) {
                            ctx.rotate(Math.PI * 2 / 3);
                            ctx.fillStyle = 'rgba(155, 89, 182, 0.4)';
                            ctx.beginPath();
                            ctx.arc(15, 0, 25, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        // 中心
                        ctx.fillStyle = '#000';
                        ctx.beginPath();
                        ctx.arc(0, 0, 20, 0, Math.PI*2);
                        ctx.fill();
                        ctx.strokeStyle = '#9B59B6';
                        ctx.lineWidth = 2;
                        ctx.stroke();

                    } else if (obs.type === 'seeker') {
                        ctx.fillStyle = obs.color;
                        ctx.beginPath();
                        ctx.moveTo(obs.x + obs.width/2, obs.y);
                        ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                        ctx.lineTo(obs.x, obs.y + obs.height);
                        ctx.closePath();
                        ctx.fill();
                        ctx.fillStyle = 'white';
                        ctx.fillRect(obs.x + 5, obs.y + 15, 6, 6);
                        ctx.fillRect(obs.x + obs.width - 11, obs.y + 15, 6, 6);
                        ctx.fillStyle = 'red';
                        ctx.fillRect(obs.x + 7, obs.y + 17, 2, 2);
                        ctx.fillRect(obs.x + obs.width - 9, obs.y + 17, 2, 2);

                    } else if (obs.type === 'fireball') {
                        let fPulse = (Math.sin(obs.timer * 5) + 1) / 2;
                        // サイズ2倍：半径を 40 ベースに
                        let fRadius = 40 + fPulse * 8;
                        let cx = obs.x + obs.width/2;
                        let cy = obs.y + obs.height/2;
                        let fGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, fRadius);
                        fGrad.addColorStop(0, '#FF4500'); // オレンジレッド
                        fGrad.addColorStop(0.4, '#B22222'); // ファイアブリック (濃赤)
                        fGrad.addColorStop(0.6, '#E74C3C');
                        fGrad.addColorStop(1, 'rgba(231, 76, 60, 0)');
                        ctx.fillStyle = fGrad;
                        ctx.beginPath();
                        ctx.arc(cx, cy, fRadius, 0, Math.PI*2);
                        ctx.fill();
                    } else if (obs.type === 'pteranodon') {
                         if (obs.warningTimer > 0) {
                            // 警告点線
                            ctx.strokeStyle = 'white'; ctx.setLineDash([5, 10]); ctx.lineWidth = 1;
                            ctx.beginPath(); ctx.moveTo(obs.x + obs.width/2, 0); ctx.lineTo(obs.x + obs.width/2, canvas.height); ctx.stroke();
                            ctx.setLineDash([]);
                        } else {
                            // プテラノドンの描画 (茶色の鋭い鳥)
                            ctx.fillStyle = '#4e342e'; ctx.beginPath();
                            ctx.moveTo(obs.x, obs.y + 15); ctx.lineTo(obs.x+obs.width, obs.y+15); ctx.lineTo(obs.x+obs.width/2, obs.y+40); ctx.closePath(); ctx.fill();
                            // 翼
                            ctx.beginPath(); ctx.moveTo(obs.x, obs.y+15); ctx.lineTo(obs.x-20, obs.y-10); ctx.lineTo(obs.x+10, obs.y+15); ctx.fill();
                            ctx.beginPath(); ctx.moveTo(obs.x+obs.width, obs.y+15); ctx.lineTo(obs.x+obs.width+20, obs.y-10); ctx.lineTo(obs.x+obs.width-10, obs.y+15); ctx.fill();
                        }
                    } else if (obs.type === 'diagonal') {
                        ctx.translate(obs.x + obs.width/2, obs.y + obs.height/2);
                        ctx.rotate(obs.rotation);
                        ctx.fillStyle = obs.color;
                        ctx.beginPath();
                        ctx.roundRect(-obs.width/2, -obs.height/2, obs.width, obs.height, 5);
                        ctx.fill();
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(-obs.width/2, -2, obs.width, 4);

                    } else if (obs.type === 'spiky') {
                        ctx.fillStyle = obs.color;
                        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                        
                        // 棘を描画
                        ctx.fillStyle = '#95a5a6';
                        for (let i = 0; i < 4; i++) {
                            // 上の棘
                            ctx.beginPath();
                            ctx.moveTo(obs.x + i * 12.5, obs.y);
                            ctx.lineTo(obs.x + i * 12.5 + 6.25, obs.y - 10);
                            ctx.lineTo(obs.x + i * 12.5 + 12.5, obs.y);
                            ctx.fill();
                            // 下の棘
                            ctx.beginPath();
                            ctx.moveTo(obs.x + i * 12.5, obs.y + obs.height);
                            ctx.lineTo(obs.x + i * 12.5 + 6.25, obs.y + obs.height + 10);
                            ctx.lineTo(obs.x + i * 12.5 + 12.5, obs.y + obs.height);
                            ctx.fill();
                        }
                    } else if (obs.type === 'secret') {
                        // 隠しステージの壁（幻の発光）
                        ctx.save();
                        ctx.fillStyle = obs.color;
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = obs.color;
                        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                        // 縁取り
                        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
                        ctx.restore();
                    } else {
                        ctx.fillStyle = obs.color;
                        ctx.beginPath();
                        ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 4);
                        ctx.fill();
                    }
                    
                    if (isDebugHitboxEnabled) {
                        ctx.strokeStyle = '#FF0000';
                        ctx.lineWidth = 1;
                        if (obs.type === 'gear') {
                            ctx.beginPath();
                            ctx.arc(0, 0, 26, 0, Math.PI * 2);
                            ctx.stroke();
                        } else if (obs.type === 'diagonal') {
                            ctx.strokeRect(-obs.width/2, -obs.height/2, obs.width, obs.height);
                        } else if (obs.type === 'thunderball') {
                            ctx.beginPath();
                            ctx.arc(0, 0, 28, 0, Math.PI * 2);
                            ctx.stroke();
                        } else if (obs.type === 'blackhole') {
                            ctx.beginPath();
                            ctx.arc(0, 0, 25, 0, Math.PI * 2);
                            ctx.stroke();
                        } else if (obs.type === 'laser' || obs.type === 'bossLaser') {
                            let laserWide = (obs.type === 'bossLaser') ? (Math.sin(obs.timer * 4) + 1) / 2 : (Math.sin(obs.timer * 3) + 1) / 2;
                            let lW = obs.width * laserWide;
                            let lX = obs.x + (1 - laserWide) * (obs.width / 2);
                            ctx.strokeRect(lX, obs.y, lW, obs.height);
                        } else {
                            ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
                        }
                    }
                    ctx.restore();
                    
                    if (obs.type === 'moving') {
                        ctx.fillStyle = '#E8DAEF';
                        ctx.fillRect(obs.x + 5, obs.y + 5, 5, obs.height - 10);
                        ctx.fillRect(obs.x + obs.width - 10, obs.y + 5, 5, obs.height - 10);
                    } else if (obs.type === 'large') {
                        ctx.fillStyle = 'rgba(0,0,0,0.3)';
                        ctx.fillRect(obs.x, obs.y + obs.height/2 - 2, obs.width, 4);
                    } else if (obs.type === 'fast') {
                        ctx.fillStyle = '#F1C40F';
                        ctx.fillRect(obs.x + obs.width/2 - 2, obs.y, 4, obs.height);
                    } else if (obs.type === 'item') {
                        drawGoldCoin(ctx, obs.x + obs.width/2, obs.y + obs.height/2, 24);
                    } else {
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect(obs.x, obs.y, obs.width, 5);
                    }
                }
                
                // パーティクルの描画
                for (let p of particles) {
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size || 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                // トレイルの描画
                if (playerTrail.length > 1) {
                    ctx.save();
                    let trailTF = (isSlowMode ? slowModeStrength : 1.0);
                    for (let i = 0; i < playerTrail.length - 1; i++) {
                        let t = playerTrail[i];
                        let nextT = playerTrail[i+1];
                        let progress = i / (playerTrail.length - 1);
                        let swayAmount = player.rotation * (1 - progress) * 120;
                        let tx = t.x - swayAmount;
                        // スロー中でもトレイルの長さを一定（実時間基準）に保つため、timeFactorで割って補正
                        let ty = t.y - (distance - t.distance) * (0.42 / trailTF) - 10;
                        let nextTProgress = (i+1) / (playerTrail.length - 1);
                        let nextSwayAmount = player.rotation * (1 - (i+1) / (playerTrail.length - 1)) * 120;
                        let nextTx = nextT.x - nextSwayAmount;
                        let nextTy = nextT.y - (distance - nextT.distance) * (0.42 / trailTF) - 10;
                        ctx.beginPath();
                        ctx.strokeStyle = player.color || 'white';
                        ctx.lineWidth = 1 + (progress * 5.5);
                        ctx.globalAlpha = 0.05 + (progress * 0.7);
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        if (progress > 0.85) { ctx.shadowBlur = 12; ctx.shadowColor = player.color || 'white'; }
                        let midX = (tx + nextTx) / 2; let midY = (ty + nextTy) / 2;
                        if (i === 0) ctx.moveTo(tx, ty);
                        else {
                            let prevT = playerTrail[i-1];
                            let prevSway = player.rotation * (1 - (i-1) / (playerTrail.length - 1)) * 120;
                            let prevTx = prevT.x - prevSway;
                            let prevTy = prevT.y - (distance - prevT.distance) * (0.42 / trailTF) - 10;
                            let midXPrev = (prevTx + tx) / 2; let midYPrev = (prevTy + ty) / 2;
                            ctx.moveTo(midXPrev, midYPrev);
                        }
                        ctx.quadraticCurveTo(tx, ty, midX, midY);
                        ctx.stroke();
                    }
                    let lastT = playerTrail[playerTrail.length - 1];
                    let secondLastT = playerTrail[playerTrail.length - 2];
                    let secondLastTy = secondLastT.y - (distance - secondLastT.distance) * (0.42 / trailTF) - 10;
                    let midXLast = (secondLastT.x + lastT.x) / 2; let midYLast = (secondLastTy + lastT.y) / 2;
                    ctx.beginPath(); ctx.lineWidth = 6; ctx.globalAlpha = 0.8;
                    ctx.moveTo(midXLast, midYLast); ctx.lineTo(lastT.x, lastT.y); ctx.stroke();
                    ctx.restore();
                }
                
                // プレイヤーの描画（ズーム等のカメラ設定下で描画）
                drawPlayer();

                ctx.restore(); // カメラ演出（ズーム等）を元に戻す

                // ボス本体の表示 (ズームの影響を受けない画面下部固定位置)
                if (!isCustomLevel && (levels[currentLevelIndex].isBossStage || levels[currentLevelIndex].isBossRush) && !isEndlessMode) {

                    if (levels[currentLevelIndex].isBossRush) {
                        let d = distance;

                ctx.fillStyle = 'white';
                ctx.font = 'bold 22px Arial';

            if (gameState === 'OPENING') {
                // 背景は通常の背景
                
                let progress = (150 - openingTimerValue) / 150; // 全進捗 (2.5s)
                let landingProgress = Math.min(1, (150 - openingTimerValue) / 30); // 最初0.5sで着地
                
                // 超ダイナミックなズーム (0.3倍の極小から一気に1.8倍へ)
                let zoomScale = 0.3 + progress * 1.5;

                // 強烈な発光

                }
                drawPlayer();
                ctx.restore();
                
                player.x = tempX; player.y = tempY; player.color = tempColor;
                equippedSkin = tempSkin; equippedMantle = tempMantle; equippedShape = tempShape;
                ctx.restore();
                
                ctx.restore();

                // スキップ案内
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText('SKIP >>', canvas.width - 20, canvas.height - 20);

                ctx.fillText(`${playerName}さん、ようこそ！`, canvas.width/2, canvas.height/2 - 100);

                ctx.fillStyle = titleColor;
                ctx.font = '44px "Righteous", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('SUPER SKY DROP', canvas.width/2, canvas.height/2 - 30);
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.font = '10px sans-serif';
                ctx.fillText('v1.6.0-ranking-active', canvas.width/2, canvas.height/2);

                ctx.textBaseline = 'alphabetic'; // 元に戻す
                ctx.shadowBlur = 0;

                // ? 遊び方 ボタン (左上に移動して設定アイコンとの被りを防ぐ)
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.beginPath(); ctx.roundRect(10, 10, 80, 30, 5); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('? 遊び方', 50, 30);
                // ctx.textAlign = 'center'; のまま維持してボタンラベルを描画する
                
                // STAGES ボタン (再生マーク)
                let btnW = 80; let btnH = 80;
                let btnX = canvas.width/2 - btnW - 20;
                let stgY = canvas.height/2 + 50; // 元の位置に戻す
                ctx.fillStyle = '#2ECC71';
                ctx.beginPath();
                ctx.roundRect(btnX, stgY, btnW, btnH, 15);
                ctx.fill();
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px sans-serif';
                ctx.fillText('ステージ', btnX + 40, stgY + 74);
                
                // 再生マーク（三角形）
                ctx.beginPath();
                ctx.moveTo(btnX + 33, stgY + 20);
                ctx.lineTo(btnX + 33, stgY + 55);
                ctx.lineTo(btnX + 58, stgY + 37);
                ctx.closePath();
                ctx.fill();
                
                // SHOP ボタン (お店のアイコン)
                let shpX = canvas.width/2 + 20;
                ctx.fillStyle = '#9B59B6';
                ctx.beginPath();
                ctx.roundRect(shpX, stgY, btnW, btnH, 15);
                ctx.fill();
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px sans-serif';
                ctx.fillText('ショップ', shpX + 40, stgY + 74);
                
                // 店の建物本体
                ctx.fillStyle = '#FDFEFE'; 
                ctx.fillRect(shpX + 15, stgY + 15, 50, 35); // +30から+15に上に移動
                
                // 屋根のひさし（赤白のストライプ）
                for (let i = 0; i < 5; i++) {

                    ctx.fillRect(shpX + 13 + (i * 11), stgY + 10, 11, 10); // +25から+10に上に移動
                }
                
                // 窓
                ctx.fillStyle = '#AED6F1';
                ctx.fillRect(shpX + 18, stgY + 27, 18, 15); // +42から+27に上に移動
                ctx.strokeStyle = '#2980B9';
                ctx.strokeRect(shpX + 18, stgY + 27, 18, 15);
                
                // ドア

                ctx.fillRect(shpX + 45, stgY + 27, 12, 23); // +42から+27に上に移動
                // ドアノブ

                ctx.beginPath();
                ctx.arc(shpX + 54, stgY + 39, 2, 0, Math.PI * 2); // +54から+39に上に移動
                ctx.fill();

                // 隠しステージボタンの表示
                if (playerName === 'super sky drop!') {
                    let secX = canvas.width/2 - 100;
                    let secY = canvas.height/2 + 150;

                ctx.fillText('・赤い障害物を避けてゴールを目指せ！', canvas.width/2, 285);

                // エンドレスモードの説明

            } else if (gameState === 'SHOP') {

                    ctx.fillText(`最高記録: 残り ${Math.max(0, goalDistance - best)}m`, canvas.width/2, canvas.height/2 - 90);

                    if (isNewRecord) {
                        ctx.fillStyle = '#F1C40F';
                        ctx.font = 'bold 24px "Righteous", sans-serif';
                        ctx.fillText('新記録達成！', canvas.width/2, canvas.height/2 - 120);
                    }

                    ctx.fillStyle = '#333';
                    ctx.font = '20px sans-serif';
                    ctx.fillText(`ゴールドコイン獲得: ${starsCollected} 枚`, canvas.width/2, canvas.height/2);
                    
                    // ゴールドコインを描画
                    for (let i = 0; i < starsCollected; i++) {
                        let cx = canvas.width/2 - ((starsCollected - 1) * 45) + (i * 90);
                        let cy = canvas.height/2 + 60;
                        drawGoldCoin(ctx, cx, cy, 36);
                    }
                    
                    // 銀の鳥コインの計算と描画
                    let by = canvas.height/2 + 95;
                    ctx.fillStyle = '#555';
                    ctx.font = 'bold 18px sans-serif';
                    ctx.textAlign = 'center';
                    let boostText = lastClearHadBoost ? ` (ボーナス+${lastBoostPercent}%!)` : '';
                    ctx.fillText(`銀の鳥コイン獲得: ${lastSilverBirdsEarned} 枚` + boostText, canvas.width/2 + 15, by);
                    drawBirdCoin(ctx, canvas.width/2 - 100, by - 6, 11);
                    
                    ctx.font = '12px sans-serif';
                    ctx.fillStyle = '#777';
                    ctx.fillText('※何度クリアしても報酬がもらえます！', canvas.width/2, by + 25);
                }
                ctx.textBaseline = 'alphabetic'; // リセット
                
                ctx.fillStyle = '#333';
                ctx.font = '18px sans-serif';
                ctx.fillText('クリックで戻る', canvas.width/2, canvas.height/2 + 150);
                ctx.textAlign = 'left';
            } else if (gameState === 'SETTINGS') {
                ctx.fillStyle = 'rgba(30, 30, 30, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#F1C40F';
                ctx.font = '36px "Righteous", sans-serif';
                ctx.textAlign = 'center';

                // BACK ボタン
                ctx.fillStyle = '#555';
                ctx.beginPath();
                ctx.roundRect(10, 10, 80, 35, 5);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = '16px sans-serif';
                ctx.fillText('戻る', 50, 33);

                // 強制的な更新ボタン (キャッシュクリア) - 画面中央上部に配置
                let updateBtnW = 160;
                let updateBtnH = 35;
                let updateBtnX = canvas.width / 2 - updateBtnW / 2;
                let updateBtnY = 20; 
                ctx.fillStyle = 'rgba(231, 76, 60, 0.4)';
                ctx.strokeStyle = '#E74C3C';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(updateBtnX, updateBtnY, updateBtnW, updateBtnH, 18);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = 'white';
                ctx.font = 'bold 13px sans-serif';
                ctx.fillText('🔄 最新の状態に更新', canvas.width/2, updateBtnY + 22);

                // タイトル「設定」- ボタンの下に配置
                ctx.fillStyle = '#F1C40F';
                ctx.font = 'bold 28px "Righteous", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('設定', canvas.width/2, 105);

                // BGMセレクト
                ctx.fillStyle = 'white';
                ctx.font = 'bold 18px sans-serif';
                ctx.fillText('BGMの雰囲気', canvas.width/2, 155);

                let bgmOptions = [
                    { id: 'pop', name: 'ポップ', desc: 'いつもの楽しい曲' },
                    { id: 'techno', name: 'テクノ', desc: 'かっこいい電子音' },
                    { id: 'chill', name: 'チル', desc: 'ゆったりした癒やし' }
                ];

                for (let i = 0; i < bgmOptions.length; i++) {
                    let opt = bgmOptions[i];
                    let btnX = 50;
                    let btnY = 180 + i * 62;
                    let btnW = canvas.width - 100;
                    let btnH = 55;

                    ctx.fillStyle = currentBGMType === opt.id ? 'rgba(46, 204, 113, 0.4)' : 'rgba(255, 255, 255, 0.1)';
                    ctx.strokeStyle = currentBGMType === opt.id ? '#2ECC71' : 'transparent';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.roundRect(btnX, btnY, btnW, btnH, 8);
                    ctx.fill();
                    if (currentBGMType === opt.id) ctx.stroke();

                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 17px sans-serif';
                    ctx.fillText(opt.name, canvas.width/2, btnY + 23);
                    ctx.font = '11px sans-serif';
                    ctx.fillStyle = '#ccc';
                    ctx.fillText(opt.desc, canvas.width/2, btnY + 44);
                }

                // スローモードの強さ設定
                ctx.fillStyle = 'white';
                ctx.font = 'bold 18px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('スローモード倍率 (0.1x - 2.0x)', canvas.width/2, 380);

                let sBtnY = 400;
                let sBtnW = 50;
                let sBtnH = 40;
                let decBtnX = canvas.width / 2 - 80;
                let incBtnX = canvas.width / 2 + 30;

                // マイナスボタン
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.beginPath(); ctx.roundRect(decBtnX, sBtnY, sBtnW, sBtnH, 5); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = 'bold 24px sans-serif';
                ctx.fillText('-', decBtnX + sBtnW/2, sBtnY + 28);

                // 現在の値
                ctx.fillStyle = '#F1C40F';
                ctx.font = 'bold 22px "Righteous", sans-serif';
                ctx.fillText(slowModeStrength.toFixed(1) + 'x', canvas.width/2, sBtnY + 28);

                // プラスボタン
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.beginPath(); ctx.roundRect(incBtnX, sBtnY, sBtnW, sBtnH, 5); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = 'bold 24px sans-serif';
                ctx.fillText('+', incBtnX + sBtnW/2, sBtnY + 28);

                ctx.fillStyle = '#ccc';
                ctx.font = '11px sans-serif';
                ctx.fillText('※プレイ中に ↑キー で切り替わります', canvas.width/2, 447);

                // 各種ON/OFFトグル
                let toggles = [
                    { label: '効果音', val: isSEEnabled },
                    { label: 'BGM', val: isIngameBGMEnabled },
                    { label: '環境音', val: isWindEnabled },
                    { label: '傾き', val: isTiltEnabled },
                    { label: '煙', val: isParticlesEnabled },
                    { label: '演出', val: isIntroEnabled },
                    { label: '影', val: isShadowsEnabled },
                    { label: '判定', val: isDebugHitboxEnabled }
                ];

                for (let i = 0; i < toggles.length; i++) {
                    let col = i % 4;
                    let row = Math.floor(i / 4);
                    let t = toggles[i];
                    let btnX = 15 + col * 95;
                    let btnY = 460 + row * 45;
                    let btnW = 85;
                    let btnH = 35;

                    ctx.fillStyle = t.val ? '#2ECC71' : '#E74C3C';
                    ctx.beginPath();
                    ctx.roundRect(btnX, btnY, btnW, btnH, 5);
                    ctx.fill();

                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 10px sans-serif';
                    ctx.fillText(t.label + (t.val ? ':ON' : ':OFF'), btnX + btnW/2, btnY + btnH/2 + 4);
                }


                ctx.textAlign = 'left';
            } else if (gameState === 'CUSTOM_LEVEL_SELECT') {
                ctx.fillStyle = '#2C3E50'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#F1C40F'; ctx.font = '28px "Righteous", sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('自作ステージ一覧', canvas.width/2, 50);

                ctx.fillStyle = '#555'; ctx.beginPath(); ctx.roundRect(10, 10, 80, 35, 5); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = '14px sans-serif'; ctx.fillText('戻る', 50, 33);

                if (customLevels.length === 0) {
                    ctx.fillStyle = 'white'; ctx.font = '16px sans-serif';
                    ctx.fillText('まだステージがありません', canvas.width/2, 200);
                    ctx.font = '12px sans-serif';
                    ctx.fillText('CREATEボタンで作ってみよう！', canvas.width/2, 230);
                } else {
                    let itemW = 110; let itemH = 60;
                    for (let i = 0; i < customLevels.length; i++) {
                        let level = customLevels[i];
                        let col = i % 3; let row = Math.floor(i / 3);
                        let bx = 25 + col * (itemW + 15); let by = 80 + row * (itemH + 15);
                        ctx.fillStyle = '#34495E'; ctx.beginPath(); ctx.roundRect(bx, by, itemW, itemH, 8); ctx.fill();
                        ctx.strokeStyle = '#3498DB'; ctx.lineWidth = 2; ctx.stroke();
                        ctx.fillStyle = 'white'; ctx.font = 'bold 14px sans-serif';
                        ctx.fillText(level.name || `STAGE ${i+1}`, bx + itemW/2, by + 28);
                        ctx.font = '10px sans-serif'; ctx.fillStyle = '#aaa';
                        ctx.fillText(`${level.totalDist}m`, bx + itemW/2, by + 45);
                    }
                }
            } else if (gameState === 'EDITOR_MENU') {
                ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#F1C40F'; ctx.font = '32px "Righteous", sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('エディター', canvas.width/2, 100);

                // ボタン1: 新規
                ctx.fillStyle = '#E67E22'; ctx.beginPath(); ctx.roundRect(50, 150, 300, 70, 15); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = 'bold 20px sans-serif';
                ctx.fillText('新しくステージを作る', canvas.width/2, 192);

                // ボタン2: 一覧（ある場合のみ）
                if (customLevels.length > 0) {
                    ctx.fillStyle = '#9B59B6'; ctx.beginPath(); ctx.roundRect(50, 240, 300, 70, 15); ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.fillText('保存したステージで遊ぶ', canvas.width/2, 282);
                }

                // もどる
                ctx.fillStyle = '#7f8c8d'; ctx.font = 'bold 18px sans-serif';
                ctx.fillText('もどる', canvas.width/2, 380);
            } else if (gameState === 'CUSTOM_ACTION_MENU') {
                ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                let level = customLevels[selectedCustomIdx];
                ctx.fillStyle = '#F1C40F'; ctx.font = '24px "Righteous", sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(level.name || 'STAGE', canvas.width/2, 100);

                let btnW = 200; let btnH = 60;
                let centerX = canvas.width / 2 - btnW / 2;

                // 遊ぶボタン
                ctx.fillStyle = '#2ECC71'; ctx.beginPath(); ctx.roundRect(centerX, 150, btnW, btnH, 10); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = 'bold 20px sans-serif';
                ctx.fillText('遊ぶ', canvas.width/2, 187);

                // 編集ボタン
                ctx.fillStyle = '#E67E22'; ctx.beginPath(); ctx.roundRect(centerX, 230, btnW, btnH, 10); ctx.fill();
                ctx.fillStyle = 'white';
                ctx.fillText('編集する', canvas.width/2, 267);

                // 削除ボタン
                ctx.fillStyle = '#C0392B'; ctx.beginPath(); ctx.roundRect(centerX, 310, btnW, btnH, 10); ctx.fill();
                ctx.fillStyle = 'white';
                ctx.fillText('削除する', canvas.width/2, 347);


            // もどるボタン
                ctx.fillStyle = '#95a5a6'; ctx.beginPath(); ctx.roundRect(centerX, 390, btnW, btnH, 10); ctx.fill();
                ctx.fillStyle = 'white';
                ctx.fillText('もどる', canvas.width/2, 427);
            }
            ctx.restore();

            // デバッグ：クリック地点に赤い丸を描画 (1秒間)
            if (lastClickTime > 0) {
                ctx.save();
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(lastClickX, lastClickY, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            }

            // エンドレスモード準備完了通知
            if (endlessNotificationTimer > 0) {
                ctx.save();
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.beginPath();
                ctx.roundRect(canvas.width/2 - 140, 20, 280, 40, 20);
                ctx.fill();
                ctx.strokeStyle = '#F1C40F';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = '#F1C40F';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('エンドレスモードが解放されました！', canvas.width/2, 40);
                ctx.restore();
            }
        }

    function gameLoop() {
        try {
            if (typeof updateBackgroundColors === 'function') updateBackgroundColors();
            // 致命的ミス：過去の整理で PLAYING の時しか update が呼ばれないようにしてしまっていた。
            // update() 内部に OPENING など別の状態ごとの時計もあるため、無条件で呼ぶ必要がある。
            update();
            draw();
        } catch (e) {
            console.error(`🚨 CRITICAL LOOP ERROR: ${e.message}`, e);
            return; 
        }
        requestAnimationFrame(gameLoop);
    }

        // ブラウザの仕様で、最初のクリック・またはキー入力で確実にBGMを鳴らせるようにする
        const enableInitialAudio = () => {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (gameState !== 'OPENING') {
                playLevelSelectBGM();
            }
        };
        window.addEventListener('click', enableInitialAudio, { once: true });
        window.addEventListener('keydown', enableInitialAudio, { once: true });

        // エディター用ホイールイベント
        canvas.addEventListener('wheel', (e) => {
            if (gameState === 'EDITOR') {
                e.preventDefault();
                // 感度を0.4倍にして精密なスクロールを実現
                editorScroll += e.deltaY * 0.4;
                if (editorScroll < -150) editorScroll = -150; // 上限
                draw();
            }
        }, { passive: false });

        // もしブラウザが許可していても、オープニングから始まるのでここでは再生しない
        // playLevelSelectBGM();
        
        gameLoop();

        // PWA & iOS Install Prompt Logic
        const isIos = () => {
            const userAgent = window.navigator.userAgent.toLowerCase();
            return /iphone|ipad|ipod/.test(userAgent);
        };
        const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

        if (isIos() && !isInStandaloneMode()) {
            const prompt = document.getElementById('ios-pwa-prompt');
            // 初回訪問時のみ表示（sessionStorageを使用）
            if (prompt && !sessionStorage.getItem('ios-pwa-prompt-shown')) {
                prompt.style.display = 'block';
                sessionStorage.setItem('ios-pwa-prompt-shown', 'true');
            }
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((reg) => {
                    console.log('Service Worker registered');
                }).catch((err) => {
                    console.error('Service Worker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
