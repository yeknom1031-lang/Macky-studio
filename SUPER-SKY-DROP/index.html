<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPER SKY DROP</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SkyDrop">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#000000">

    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        canvas { 
            display: block; 
            filter: contrast(110%) brightness(105%); 
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background-color: #000;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #debug-info {
            position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8);
            color: #ff3333; padding: 10px; border-radius: 5px; font-size: 11px;
            pointer-events: none; z-index: 10000; border: 1px solid #ff3333;
            max-width: 320px; display: none; font-family: monospace;
        }

        /* iOS Installation Guide */
        #ios-pwa-prompt {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            display: none;
            padding: 20px;
            z-index: 100000;
            color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .prompt-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .prompt-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            margin-right: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .prompt-title {
            font-weight: bold;
            font-size: 18px;
            color: #000;
        }

        .prompt-text {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .prompt-action-bar {
            border-top: 1px solid #ddd;
            padding-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .share-icon {
            width: 24px;
            height: 24px;
            vertical-align: middle;
        }

        .btn-close {
            background: #eee;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div id="debug-info"></div>
    
    <!-- iOS PWA Prompt -->
    <div id="ios-pwa-prompt">
        <div class="prompt-header">
            <img src="apple-touch-icon.png" class="prompt-icon" alt="App Icon">
            <div class="prompt-title">ホーム画面に追加</div>
        </div>
        <div class="prompt-text">
            このゲームをフルスクリーンで遊ぶには、ホーム画面に追加してください。
        </div>
        <div class="prompt-action-bar">
            <button class="btn-close" onclick="document.getElementById('ios-pwa-prompt').style.display='none'">閉じる</button>
            <span>下の <img src="https://developer.apple.com/design/human-interface-guidelines/foundations/images/icons/sharing/share.png" class="share-icon" style="height:20px; filter:invert(0.5);"> アイコンをタップして「ホーム画面に追加」を選択してください。</span>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        // ==== グローバルランキング設定 ====
        // ※ ユーザーから提供されるGASのURLをここに記述します
        const RANKING_GAS_URL = "https://script.google.com/macros/s/AKfycbyFKTe99QLKxivdnqrTlcTr1UT95fJlwGxk4fQVWFlNsth2fAUWd_enofwEk3hOv4-g/exec"; 
        let worldRankingData = [];
        let isRankingLoading = false;
        // エラー発生時に画面に表示する
        const debugInfo = document.getElementById('debug-info');
        window.onerror = function(msg, url, line) {
            debugInfo.style.display = 'block';
            debugInfo.innerHTML = `[ERROR] ${msg}<br>LINE: ${line}`;
            return false;
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        window.onerror = function(msg, source, lineno, colno, error) {
            console.error(`🚨 ERROR: ${msg} LINE: ${lineno}`);
            return false;
        };

        // roundRect のポリフィル（全てのブラウザで確実に動くようにする）
        if (!ctx.roundRect) {
            ctx.roundRect = function(x, y, w, h, r) {
                if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
                ctx.beginPath();
                ctx.moveTo(x + (r.tl||0), y);
                ctx.lineTo(x + w - (r.tr||0), y);
                ctx.arcTo(x + w, y, x + w, y + (r.tr||0), r.tr||0);
                ctx.lineTo(x + w, y + h - (r.br||0));
                ctx.arcTo(x + w, y + h, x + w - (r.br||0), y + h, r.br||0);
                ctx.lineTo(x + (r.bl||0), y + h);
                ctx.arcTo(x, y + h, x, y + h - (r.bl||0), r.bl||0);
                ctx.lineTo(x, y + (r.tl||0));
                ctx.arcTo(x, y, x + (r.tl||0), y, r.tl||0);
                ctx.closePath();
                return ctx;
            };
        }

        // ====== 互換性・ポリフィル ======
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (typeof r === 'undefined') r = 0;
                if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
                else r = Object.assign({tl: 0, tr: 0, br: 0, bl: 0}, r);
                this.moveTo(x + r.tl, y);
                this.lineTo(x + w - r.tr, y);
                this.arcTo(x + w, y, x + w, y + r.tr, r.tr);
                this.lineTo(x + w, y + h - r.br);
                this.arcTo(x + w, y + h, x + w - r.br, y + h, r.br);
                this.lineTo(x + r.bl, y + h);
                this.arcTo(x, y + h, x, y + h - r.bl, r.bl);
                this.lineTo(x, y + r.tl);
                this.arcTo(x, y, x + r.tl, y, r.tl);
                this.closePath();
                return this;
            };
        }

        // ====== オーディオ機能 ======
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContextClass();
        function initAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }

        let bgmInterval = null;
        // ポップでつい歌いたくなるペンタトニックスケールのメロディ (6つのバリエーションのループ)
        let bgmNotes = [
            // パターンA (基本)
            523.25, 392.00, 440.00, 392.00, 0,      329.63, 392.00, 0,
            261.63, 329.63, 392.00, 523.25, 587.33, 0,      523.25, 0,
            // パターンB (同じリズムで高い音へ)
            659.25, 523.25, 587.33, 523.25, 0,      440.00, 523.25, 0,
            392.00, 440.00, 523.25, 659.25, 783.99, 0,      659.25, 0,
            // パターンC (流れるような滝下り)
            783.99, 659.25, 587.33, 523.25, 440.00, 392.00, 329.63, 261.63,
            329.63, 392.00, 440.00, 523.25, 659.25, 783.99, 1046.5, 0,
            // パターンD (元気なアルペジオ・駆け上がり)
            261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.5, 0,
            783.99, 0,      659.25, 0,      523.25, 392.00, 329.63, 261.63,
            // パターンE (少し落ち着いたアンサーフレーズ)
            392.00, 329.63, 261.63, 0,      329.63, 0,      392.00, 440.00,
            523.25, 0,      440.00, 392.00, 329.63, 0,      261.63, 0,
            // パターンF (豪華な締めくくりからループへの戻り)
            440.00, 523.25, 659.25, 783.99, 1046.5, 783.99, 659.25, 523.25,
            392.00, 0,      523.25, 0,      261.63, 0,      0,      0
        ]; 
        // ベース用の音（低音でリズムを支える）
        let bassNotes = [
            // パターンA
            130.81, 130.81, 174.61, 174.61, 196.00, 196.00, 196.00, 196.00,
            130.81, 130.81, 196.00, 196.00, 261.63, 261.63, 261.63, 261.63,
            // パターンB
            174.61, 174.61, 233.08, 233.08, 261.63, 261.63, 261.63, 261.63,
            174.61, 174.61, 261.63, 261.63, 349.23, 349.23, 349.23, 349.23,
            // パターンC
            196.00, 196.00, 174.61, 174.61, 130.81, 130.81, 174.61, 174.61,
            130.81, 130.81, 174.61, 174.61, 196.00, 196.00, 261.63, 261.63,
            // パターンD
            174.61, 174.61, 174.61, 174.61, 174.61, 174.61, 174.61, 174.61,
            196.00, 196.00, 196.00, 196.00, 196.00, 196.00, 196.00, 196.00,
            // パターンE
            130.81, 130.81, 130.81, 130.81, 130.81, 130.81, 130.81, 130.81,
            220.00, 220.00, 220.00, 220.00, 220.00, 220.00, 220.00, 220.00,
            // パターンF
            174.61, 174.61, 174.61, 174.61, 196.00, 196.00, 196.00, 196.00,
            130.81, 130.81, 130.81, 130.81, 130.81, 130.81, 261.63, 261.63
        ];
        let noteIndex = 0;

        // --- オープニング専用 SE (ピューいプーん) ---
        async function playOpeningSFX() {
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            if (typeof isSEEnabled !== 'undefined' && !isSEEnabled) return;

            const now = audioCtx.currentTime;
            const mainGain = audioCtx.createGain();
            mainGain.connect(audioCtx.destination);
            mainGain.gain.setValueAtTime(0, now);
            mainGain.gain.linearRampToValueAtTime(0.5, now + 0.1);
            mainGain.gain.exponentialRampToValueAtTime(0.001, now + 2.0);

            // 1. 「ピューい」 (高音のチャープ音)
            const pew = audioCtx.createOscillator();
            pew.type = 'sine';
            pew.frequency.setValueAtTime(600, now);
            pew.frequency.exponentialRampToValueAtTime(1800, now + 0.3);
            
            const pewGain = audioCtx.createGain();
            pewGain.gain.setValueAtTime(0, now);
            pewGain.gain.linearRampToValueAtTime(0.3, now + 0.1);
            pewGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            
            pew.connect(pewGain);
            pewGain.connect(mainGain);
            pew.start(now);
            pew.stop(now + 0.5);

            // 2. 「プーん」 (深みのあるベースドロップ)
            const poon = audioCtx.createOscillator();
            const poonTri = audioCtx.createOscillator();
            poon.type = 'sine';
            poonTri.type = 'triangle';
            
            // 少し遅れて「プーん」
            const poonStart = now + 0.4;
            poon.frequency.setValueAtTime(160, poonStart);
            poon.frequency.exponentialRampToValueAtTime(60, poonStart + 1.2);
            poonTri.frequency.setValueAtTime(160, poonStart);
            poonTri.frequency.exponentialRampToValueAtTime(60, poonStart + 1.2);
            
            const poonGain = audioCtx.createGain();
            poonGain.gain.setValueAtTime(0, poonStart);
            poonGain.gain.linearRampToValueAtTime(0.4, poonStart + 0.1);
            poonGain.gain.exponentialRampToValueAtTime(0.001, poonStart + 1.5);
            
            poon.connect(poonGain);
            poonTri.connect(poonGain);
            poonGain.connect(mainGain);
            
            poon.start(poonStart);
            poonTri.start(poonStart);
            poon.stop(poonStart + 1.6);
            poonTri.stop(poonStart + 1.6);
        }
        function playLevelSelectBGM() {
            if (gameState === 'PLAYING' || gameState === 'GAMEOVER' || gameState === 'CLEAR') return;
            stopIngameBGM();
            initAudio();
            if (bgmInterval) return; 
            bgmInterval = setInterval(() => {
                if (audioCtx.state !== 'running' || (gameState === 'PLAYING' || gameState === 'GAMEOVER' || gameState === 'CLEAR')) {
                    stopLevelSelectBGM();
                    return;
                }
                
                let freq = bgmNotes[noteIndex];
                let bassFreq = bassNotes[noteIndex];
                
                // BGMタイプによって音色やピッチを変える
                let type1 = 'triangle';
                let type2 = 'square';
                let typeBass = 'sawtooth';

                if (currentBGMType === 'techno') {
                    type1 = 'sawtooth';
                    type2 = 'square';
                    freq *= 0.5; // 低め
                    bassFreq *= 0.5;
                } else if (currentBGMType === 'chill') {
                    type1 = 'sine';
                    type2 = 'sine';
                    typeBass = 'sine';
                }

                // --- 1. メインメロディ ---
                if (freq !== 0) {
                    let osc1 = audioCtx.createOscillator();
                    let gain1 = audioCtx.createGain();
                    osc1.type = type1;
                    osc1.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain1.gain.setValueAtTime(0, audioCtx.currentTime);
                    gain1.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.02);
                    gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                    osc1.connect(gain1); gain1.connect(audioCtx.destination);
                    osc1.start(audioCtx.currentTime); osc1.stop(audioCtx.currentTime + 0.25);
                    
                    let osc2 = audioCtx.createOscillator();
                    let gain2 = audioCtx.createGain();
                    osc2.type = type2;
                    osc2.frequency.setValueAtTime(freq * 1.005, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(0, audioCtx.currentTime);
                    gain2.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 0.02);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.start(audioCtx.currentTime); osc2.stop(audioCtx.currentTime + 0.25);
                }

                // --- 2. ベースライン ---
                if (bassFreq !== 0) {
                    let oscBass = audioCtx.createOscillator();
                    let gainBass = audioCtx.createGain();
                    oscBass.type = typeBass;
                    oscBass.frequency.setValueAtTime(bassFreq, audioCtx.currentTime);
                    
                    gainBass.gain.setValueAtTime(0, audioCtx.currentTime);
                    gainBass.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 0.02);
                    gainBass.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                    
                    let filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(currentBGMType === 'techno' ? 800 : 500, audioCtx.currentTime);

                    oscBass.connect(filter); filter.connect(gainBass); gainBass.connect(audioCtx.destination);
                    oscBass.start(audioCtx.currentTime); oscBass.stop(audioCtx.currentTime + 0.25);
                }

                // --- 3. ドラム風のパーカッション ---
                if (noteIndex % 2 === 0) {
                    let oscKick = audioCtx.createOscillator();
                    let gainKick = audioCtx.createGain();
                    oscKick.type = 'sine';
                    oscKick.frequency.setValueAtTime(currentBGMType === 'techno' ? 100 : 150, audioCtx.currentTime);
                    oscKick.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    
                    gainKick.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gainKick.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    
                    oscKick.connect(gainKick); gainKick.connect(audioCtx.destination);
                    oscKick.start(audioCtx.currentTime); oscKick.stop(audioCtx.currentTime + 0.1);
                }

                noteIndex = (noteIndex + 1) % bgmNotes.length;
            }, 250); 
        }

        function stopLevelSelectBGM() {
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
        }

        function playIntroWindSound() {
            initAudio();
            let bs = audioCtx.sampleRate * 2.5; 
            let buf = audioCtx.createBuffer(1, bs, audioCtx.sampleRate);
            let p = buf.getChannelData(0);
            for (let i = 0; i < bs; i++) p[i] = Math.random() * 2 - 1; 
            
            let src = audioCtx.createBufferSource();
            src.buffer = buf;
            let filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(300, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 1.2); 
            
            let gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.5);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
            
            src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            src.start();
        }

        function playTapSound() {
            if (!isSEEnabled) return;
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05); // ピッという高い音
            osc.type = 'sine';
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playFireSound() {
            if (!isSEEnabled) return;
            initAudio();
            let now = audioCtx.currentTime;
            // 陋石衝突音: 超低音でブーン！
            let osc1 = audioCtx.createOscillator();
            let g1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(40, now);
            osc1.frequency.exponentialRampToValueAtTime(10, now + 0.8);
            g1.gain.setValueAtTime(0.0, now);
            g1.gain.linearRampToValueAtTime(0.7, now + 0.02);
            g1.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
            osc1.connect(g1); g1.connect(audioCtx.destination);
            osc1.start(now); osc1.stop(now + 0.9);
            // 相伴のクラッシュノイズ
            let bs = audioCtx.sampleRate * 0.4;
            let buf = audioCtx.createBuffer(1, bs, audioCtx.sampleRate);
            let p = buf.getChannelData(0);
            for (let i = 0; i < bs; i++) p[i] = Math.random() * 2 - 1;
            let nSrc = audioCtx.createBufferSource();
            nSrc.buffer = buf;
            let nFlt = audioCtx.createBiquadFilter();
            nFlt.type = 'lowpass';
            nFlt.frequency.setValueAtTime(800, now);
            nFlt.frequency.exponentialRampToValueAtTime(100, now + 0.4);
            let nGain = audioCtx.createGain();
            nGain.gain.setValueAtTime(0.5, now);
            nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            nSrc.connect(nFlt); nFlt.connect(nGain); nGain.connect(audioCtx.destination);
            nSrc.start(now);
        }

        function playLaserSound() {
            if (!isSEEnabled) return;
            initAudio();
            let now = audioCtx.currentTime;

            // 「ド」と「ドン！」の2回鳴らす関数
            function playThunderDon(startTime, freq, volume, duration) {
                let osc = audioCtx.createOscillator();
                let g = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                osc.frequency.exponentialRampToValueAtTime(10, startTime + duration);
                g.gain.setValueAtTime(volume, startTime);
                g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(startTime); osc.stop(startTime + duration);

                // 地響きのようなノイズ
                let bs = audioCtx.sampleRate * duration;
                let buf = audioCtx.createBuffer(1, bs, audioCtx.sampleRate);
                let p = buf.getChannelData(0);
                for (let i = 0; i < bs; i++) p[i] = Math.random() * 2 - 1;
                let nSrc = audioCtx.createBufferSource();
                nSrc.buffer = buf;
                let nf = audioCtx.createBiquadFilter(); nf.type = 'lowpass'; nf.frequency.setValueAtTime(300, startTime);
                let ng = audioCtx.createGain(); ng.gain.setValueAtTime(volume * 0.4, startTime);
                ng.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.3);
                nSrc.connect(nf); nf.connect(ng); ng.connect(audioCtx.destination);
                nSrc.start(startTime);
            }

            // 「ド」 (1回目：少し小さめ)
            playThunderDon(now, 100, 0.6, 0.4);
            // 「ドン！」 (2回目：強めで長く)
            playThunderDon(now + 0.12, 80, 0.9, 0.8);

            // バリバリ音（電気のスパークノイズ）
            let nb = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
            let nd = nb.getChannelData(0);
            for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
            let ns = audioCtx.createBufferSource(); ns.buffer = nb;
            let nf = audioCtx.createBiquadFilter(); nf.type = 'highpass'; nf.frequency.value = 2500;
            let ng = audioCtx.createGain(); ng.gain.setValueAtTime(0.4, now + 0.1); ng.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
            ns.connect(nf); nf.connect(ng); ng.connect(audioCtx.destination); ns.start(now + 0.1);
        }

        function playClearSound() {
            if (!isSEEnabled) return;
            initAudio();
            // ド・ミ・ソ・高いド のファンファーレ的な和音アルペジオ

        function playIngameBGM() {
            if (gameState !== 'PLAYING') return;
            stopLevelSelectBGM();
            if (!isIngameBGMEnabled) return;
            initAudio();
            if (ingameBgmProgressionInterval) return; 

            let themeIndex = Math.floor(currentLevelIndex / 2) % 10;
            const progression = ingameBgmThemes[themeIndex];
            ingameBgmStep = 0;

            const playChord = (chord) => {
                let gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 3); // 3秒かけてフェードイン
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 9);    // 9秒後に完全に消える（クロスフェード用）
                gain.connect(audioCtx.destination);

                chord.forEach((f, i) => {
                    let osc = audioCtx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, audioCtx.currentTime);
                    
                    let lfo = audioCtx.createOscillator();
                    lfo.frequency.value = 0.1 + (i * 0.05);
                    let lfoGain = audioCtx.createGain();
                    lfoGain.gain.value = 0.8; 
                    lfo.connect(lfoGain);
                    lfoGain.connect(osc.frequency);
                    lfo.start();

                    osc.connect(gain);
                    osc.start();
                    ingameBgmOscs.push(osc, lfo);
                    
                    // 10秒後に停止してメモリ解放
                    setTimeout(() => {
                        try { osc.stop(); lfo.stop(); } catch(e){}
                    }, 10000);
                });

                // 配列の掃除
                setTimeout(() => {
                    ingameBgmOscs = ingameBgmOscs.filter(o => o.playbackState !== 'finished');
                }, 11000);
            };

            // 初回のコード
            playChord(progression[ingameBgmStep]);

            // 8秒ごとに次のコードへ（フェードイン・フェードアウトが重なる）
            ingameBgmProgressionInterval = setInterval(() => {
                ingameBgmStep = (ingameBgmStep + 1) % progression.length;
                playChord(progression[ingameBgmStep]);
            }, 8000);
        }

        function seededRandom() {
            let t = seed += 0x6D2B79F5;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;

        let countdownInterval = null;
        let isLooping = false;

        // ステージ背景の5種類のテーマ（＋夕焼けの計6種類）を追加
        // 背景色のグラデーションデータ（RGB）
        const themeBgData = [
            { c1: [26, 42, 108], c2: [178, 31, 31], c3: [253, 187, 45] },    // 1. 夕焼け
            { c1: [86, 204, 242], c2: [62, 166, 240], c3: [47, 128, 237] },   // 2. 爽やかな青空
            { c1: [15, 32, 39], c2: [32, 58, 67], c3: [44, 83, 100] },       // 3. 宇宙・夜空
            { c1: [74, 0, 224], c2: [108, 22, 225], c3: [142, 45, 226] },     // 4. 夕暮れの紫
            { c1: [17, 153, 142], c2: [27, 200, 133], c3: [56, 239, 125] },   // 5. 猛毒の緑
            { c1: [255, 78, 80], c2: [252, 145, 58], c3: [249, 212, 35] }     // 6. 朝焼け
        ];

        let currentBgColors = {
            c1: [...themeBgData[0].c1],
            c2: [...themeBgData[0].c2],
            c3: [...themeBgData[0].c3]
        };
        let lastTargetIdx = -1;
        let transitionStartTime = 0;
        let sourceBgColors = null;

        function lerpColor(c1, c2, t) {
            return [
                c1[0] + (c2[0] - c1[0]) * t,
                c1[1] + (c2[1] - c1[1]) * t,
                c1[2] + (c2[2] - c1[2]) * t
            ];
        }

        function updateBackgroundColors() {
            if (gameState === 'LEVEL_SELECT' || gameState === 'PLAYING' || gameState === 'GAMEOVER' || gameState === 'CLEAR' || gameState === 'EDITOR') {
                if ((isCustomLevel || gameState === 'EDITOR') && editorLevel && editorLevel.bgIdx !== undefined) {
                    targetIdx = editorLevel.bgIdx % themeBgData.length;
                } else {
                    targetIdx = currentLevelIndex % themeBgData.length;
                }
            }

            if (targetIdx !== lastTargetIdx) {
                // ターゲットが変わったら遷移開始
                lastTargetIdx = targetIdx;
                transitionStartTime = Date.now();
                sourceBgColors = {
                    c1: [...currentBgColors.c1],
                    c2: [...currentBgColors.c2],
                    c3: [...currentBgColors.c3]
                };
            }

            if (sourceBgColors) {
                let elapsed = Date.now() - transitionStartTime;
                let duration = 500; // 0.5秒
                let t = Math.min(1, elapsed / duration);
                
                // イージングをかける（smoothstep風）
                let ease = t * t * (3 - 2 * t);
                
                const target = themeBgData[targetIdx];
                currentBgColors.c1 = lerpColor(sourceBgColors.c1, target.c1, ease);
                currentBgColors.c2 = lerpColor(sourceBgColors.c2, target.c2, ease);
                currentBgColors.c3 = lerpColor(sourceBgColors.c3, target.c3, ease);
                
                if (t >= 1) sourceBgColors = null; // 遷移完了
            }
        }

        const backgroundThemes = [
            'linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d)', 
            'linear-gradient(to bottom, #56CCF2, #2F80ED)',         
            'linear-gradient(to bottom, #0F2027, #203A43, #2C5364)', 
            'linear-gradient(to bottom, #4A00E0, #8E2DE2)',         
            'linear-gradient(to bottom, #11998e, #38ef7d)',         
            'linear-gradient(to bottom, #FF4E50, #F9D423)'          
        ];

        // レベル設定 (1〜60まで)
        const levels = [];
        for (let i = 0; i < 60; i++) {
            let speed = 0.7; 
            let rate = 0.022 + ((i % 20) * 0.004) + (i >= 20 ? 0.015 : (i >= 40 ? 0.025 : 0)); 
            
            let hue;
            if (i < 20) hue = (120 - (i * 6)); // 第1章: 緑→赤
            else if (i < 40) hue = (240 - ((i-20) * 8)); // 第2章: 青→紫
            else hue = (20 - ((i-40) * 4)); // 第3章: オレンジ→赤
            
            if (hue < 0) hue += 360; 
            
            let color1 = `hsl(${hue}, 70%, 55%)`;
            let color2 = `hsl(${(hue + 25) % 360}, 80%, 45%)`; 
            
            let bgTheme = backgroundThemes[i % backgroundThemes.length];
            // 各チャプターの最後（20, 40, 60ステージ目）をボス戦に設定
            let isBoss = (i === 19 || i === 39 || i === 59);
            levels.push({ 
                name: String((i % 20) + 1), 
                speed: speed, 
                rate: rate, 
                color1: color1, 
                color2: color2, 
                bg: bgTheme,
                isBossStage: isBoss
            });
        }
        // 裏ボスラッシュステージ
        levels.push({
            name: "???",
            speed: 0.85,
            rate: 0.07,
            color1: "#000000",
            color2: "#4B0082",
            bg: 'linear-gradient(to bottom, #000, #1a012a)',
            isBossStage: true,
            isBossRush: true
        });

        // プレイヤーキャラクターの設定
        const player = {
            x: canvas.width / 2 - 15,
            y: 150,
            width: 30,
            height: 30,
            color: skinColors[equippedSkin] || '#FFD700',
            speed: 5,
            rotation: 0 // 追加：傾き
        };

        // キー入力状態
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false,
            ArrowDown: false
        };

        // 配列：障害物、軌跡、ゴール
        let obstacles = [];
        let particles = [];
        let playerTrail = []; // 追加：軌跡（トレイル）
        let clouds = [];
        let bgStars = [];
        let goal = null;

        for(let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                width: 50 + Math.random() * 50,
                height: 20 + Math.random() * 20,
                speedY: 2 + Math.random() * 2
            });
        }
        for(let i = 0; i < 40; i++) {
            bgStars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speedY: Math.random() * 1.5 + 0.5,
                alpha: Math.random()
            });
        }

        window.addEventListener('keydown', (e) => {
            initAudio();
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = true;
            }
            if (e.code === 'Enter') {
                if (gameState === 'START' || gameState === 'CLEAR' || gameState === 'GAMEOVER' || gameState === 'PLAYING') {
                    if (gameState === 'GAMEOVER' && countdownInterval) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                    }
                    if (gameState === 'PLAYING') {
                        stopAllSounds(); // プレイ中の風の音などを止める
                    }
                    playTapSound();
                    isEndlessMode = false; // エンドレスを解除
                    gameState = 'START';
                    playLevelSelectBGM();
                    draw();
                }
            }
            // ゲームオーバー時に矢印キーですぐにリトライ（エンドレスモード以外）
            if (gameState === 'GAMEOVER' && !isEndlessMode && (e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'ArrowUp')) {
                // 押しっぱなしによる誤リトライを防ぐため、0.5秒の待機時間を設ける
                if (Date.now() - gameOverTime < 500) return;

                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                if (e.code === 'ArrowUp') {
                    isSlowMode = true;
                    isPracticeUsed = true;
                    resetGame(); // ↑キーが最優先
                    return; // 重要：resetGameでPLAYINGになるため、下のトグル処理に行かないようにする
                } else if (!isSlowMode && (e.code === 'ArrowLeft' || e.code === 'ArrowRight')) {
                    // 通常リトライ
                    isSlowMode = false;
                    resetGame();
                    return;
                } else if (isSlowMode && (e.code === 'ArrowLeft' || e.code === 'ArrowRight')) {
                    // スロー中に通常リトライしたい場合のために解除
                    isSlowMode = false;
                    resetGame();
                    return;
                }
            }
            if (e.code === 'ArrowUp' && gameState === 'PLAYING' && !isEndlessMode) {
                isSlowMode = !isSlowMode;
                if (isSlowMode) isPracticeUsed = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = false;
            }
        });

        // --- 座標変換ユーティリティ ---
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches[0]) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else if (e.changedTouches && e.changedTouches[0]) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const internalW = canvas.width;
            const internalH = canvas.height;
            const externalW = rect.width;
            const externalH = rect.height;

            const canvasRatio = internalW / internalH;
            const screenRatio = externalW / externalH;

            let scale, offsetX, offsetY;
            if (screenRatio > canvasRatio) {
                // 左右に余白（pillarbox）
                scale = externalH / internalH;
                offsetX = (externalW - internalW * scale) / 2;
                offsetY = 0;
            } else {
                // 上下に余白（letterbox）
                scale = externalW / internalW;
                offsetX = 0;
                offsetY = (externalH - internalH * scale) / 2;
            }

            return {
                x: (clientX - rect.left - offsetX) / scale,
                y: (clientY - rect.top - offsetY) / scale
            };
        }

        // ====== タッチ操作 (iPhone用) ======
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();
            const pos = getMousePos(e);
            const x = pos.x;
            const y = pos.y;


            if (gameState === 'PLAYING') {
                if (x > canvas.width - 70 && y < 50) {
                    playTapSound(); stopAllSounds(); gameState = 'START'; draw(); return;
                }
                if (y < canvas.height * 0.25) {
                    // 画面上部25%：スローモード切り替え
                    if (!isEndlessMode) {
                        isSlowMode = !isSlowMode;
                        if (isSlowMode) isPracticeUsed = true;
                        playTapSound();
                    }
                } else {
                    // 画面下部75%：左右移動
                    if (x < canvas.width / 2) {
                        keys.ArrowLeft = true;
                        keys.ArrowRight = false;
                    } else {
                        keys.ArrowRight = true;
                        keys.ArrowLeft = false;
                    }
                }
            } else {
                // プレイ中以外は既存のクリック処理を呼び出す
                handleInteraction(x, y);
                if (gameState === 'EDITOR') {
                    window.editorLastTouchY = y;
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const pos = getMousePos(e);
            const x = pos.x;
            const y = pos.y;

            
            if (gameState === 'PLAYING') {
                if (y >= canvas.height * 0.25) {
                    if (x < canvas.width / 2) {
                        keys.ArrowLeft = true;
                        keys.ArrowRight = false;
                    } else {
                        keys.ArrowRight = true;
                        keys.ArrowLeft = false;
                    }
                }
            } else if (gameState === 'EDITOR') {
                if (y < canvas.height - 150) {
                    if (window.editorLastTouchY !== undefined) {
                        editorScroll -= (y - window.editorLastTouchY) * 2;
                        editorScroll = Math.max(0, editorScroll);
                        draw();
                    }
                    window.editorLastTouchY = y;
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys.ArrowLeft = false;
            keys.ArrowRight = false;
            window.editorLastTouchY = undefined;
        }, { passive: false });

        canvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);
            const x = pos.x;
            const y = pos.y;

            if (gameState === 'EDITOR') {
                if (y < canvas.height - 150) {
                    // オブジェクトのクリック判定
                    let foundIdx = -1;
                    let clickDist = editorScroll + y - 150;
                    let snapX = Math.round(x / 20) * 20;

                    for(let i=0; i<editorLevel.objects.length; i++){
                        let o = editorLevel.objects[i];
                        if (Math.abs(o.d - clickDist) < 25 && x >= o.x && x <= o.x + o.w) {
                            foundIdx = i; break;
                        }
                    }
                    if (foundIdx !== -1) {
                        editorSelectedIndex = foundIdx;
                        isObjectDragging = true;
                        draw();
                    } else {
                        // 空白地点クリックで選択解除
                        editorSelectedIndex = -1;
                        draw();
                    }
                }
            }
        });

        window.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);
            const x = pos.x;
            const y = pos.y;
            
            if (gameState === 'EDITOR') {
                if (isObjectDragging && editorSelectedIndex !== -1) {
                    // オブジェクトのドラッグ
                    let o = editorLevel.objects[editorSelectedIndex];
                    let GRID = 20;
                    
                    // X座標と距離dを更新
                    o.x = Math.max(0, Math.min(canvas.width - o.w, Math.round((x - o.w / 2) / GRID) * GRID));
                    o.d = Math.max(0, Math.min(20000, Math.round((editorScroll + y - 150) / GRID) * GRID));
                    
                    draw();
                }
            }
        });

        window.addEventListener('mouseup', () => {
            isEditorDragging = false;
            isObjectDragging = false;
        });

        canvas.addEventListener('click', (e) => {
            initAudio();
            const pos = getMousePos(e);
            lastClickX = pos.x;
            lastClickY = pos.y;
            lastClickTime = Date.now();
            
            // デバッグログ (非表示)
            // console.log(`CLICK at (${Math.floor(pos.x)}, ${Math.floor(pos.y)}) State: ${gameState}`);
            
            handleInteraction(pos.x, pos.y);
        });

        function handleInteraction(x, y) {
            if (gameState === 'OPENING') {
                playTapSound();
                gameState = 'START';
                draw();
                return;
            }
            if (gameState === 'START') {
                let btnW = 80; let btnH = 80;
                let btnX = canvas.width/2 - btnW - 20;
                let shpX = canvas.width/2 + 20;
                let stgY = canvas.height/2 + 50;
                // ? 遊び方 (左上に移動)
                if (x > 10 && x < 90 && y > 10 && y < 40) {
                    playTapSound(); gameState = 'TUTORIAL'; draw(); return;
                }
                
                // PLAYボタン判定
                if (x > btnX && x < btnX + btnW && y > stgY && y < stgY + btnH) {
                    playTapSound(); 
                    if (!hasSeenTutorial) {
                        hasSeenTutorial = true;
                        localStorage.setItem('superSkyDropTutorial', 'true');
                        gameState = 'TUTORIAL';
                        draw();
                        return;
                    }
                    isCustomLevel = false; gameState = 'LEVEL_SELECT'; playLevelSelectBGM(); draw(); return;
                }
                // SHOPボタン判定
                if (x > shpX && x < shpX + btnW && y > stgY && y < stgY + btnH) {
                    playTapSound(); gameState = 'SHOP'; draw(); return;
                }
                // エンドレス
                if (x > 20 && x < 100 && y > canvas.height - 90 && y < canvas.height - 50) {
                    playTapSound(); startEndlessMode();
                    return;
                }
                // 設定 (右上)
                if (x > canvas.width - 60 && x < canvas.width - 10 && y > 10 && y < 60) {
                    playTapSound(); gameState = 'SETTINGS'; draw(); return;
                }
                // 挨拶テキストのタップ判定（名前変更）
                if (x > canvas.width/2 - 120 && x < canvas.width/2 + 120 && y > canvas.height/2 - 125 && y < canvas.height/2 - 80) {
                    playTapSound();
                    let newName = prompt("新しい名前を入力（1〜15文字）：", playerName);
                    if (newName !== null) {
                        newName = newName.trim();
                        if (newName.length >= 1 && newName.length <= 15) {
                            playerName = newName;
                            localStorage.setItem('superSkyDropPlayerName', playerName);
                        } else if (newName.length > 15) {
                            alert("名前が長すぎます（15文字まで）");
                        } else if (newName.length === 0) {
                            alert("名前を入力してください");
                        }
                    }
                    // 名前入力(modal)から戻った後に音楽を確実に再開させる
                    initAudio();
                    playLevelSelectBGM();
                    draw(); return;
                }
                // エディター
                let creX = canvas.width - 100; let creY = canvas.height - 100;
                if (x > creX && x < creX + 80 && y > creY && y < creY + 80) {
                    playTapSound(); gameState = 'EDITOR_MENU'; draw(); return;
                }
                // ワールドランキングボタン
                if (x > 110 && x < 240 && y > canvas.height - 90 && y < canvas.height - 50) {
                    playTapSound();
                    gameState = 'RANKING';
                    fetchRanking();
                    draw();
                    return;
                }
            } else if (gameState === 'RANKING') {
                // BACKボタン
                if (x > 10 && x < 90 && y > 10 && y < 45) {
                    playTapSound();
                    gameState = 'START';
                    draw();
                    return;
                }
            } else if (gameState === 'EDITOR_MENU') {
                // 新しく作る
                if (x > 50 && x < 350 && y > 150 && y < 220) {
                    playTapSound();
                    if (editorLevel.objects.length > 0) {
                        if (confirm("新しくステージを作りますか？（現在の編集内容は消えます）")) {
                            editorLevel = { name: "MY STAGE", speed: 0.7, objects: [], bgText: 'linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d)', totalDist: 4000, startDist: 0, startX: canvas.width/2 - 15 };
                            editorScroll = 0; editorSelectedIndex = -1; editingCustomIndex = -1;
                            gameState = 'EDITOR'; draw();
                        }
                    } else {
                        editorLevel = { name: "MY STAGE", speed: 0.7, objects: [], bgText: 'linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d)', totalDist: 4000, startDist: 0, startX: canvas.width/2 - 15 };
                        editorScroll = 0; editorSelectedIndex = -1; editingCustomIndex = -1;
                        gameState = 'EDITOR'; draw();
                    }
                    return;
                }
                // 自作ステージ一覧
                if (x > 50 && x < 350 && y > 240 && y < 310 && customLevels.length > 0) {
                    playTapSound(); gameState = 'CUSTOM_LEVEL_SELECT'; draw(); return;
                }
                // もどる
                if (y > 350 && y < 400) { playTapSound(); gameState = 'START'; draw(); return; }
            } else if (gameState === 'EDITOR') {
                const GRID = 20;
                editorLevel.totalDist = editorLevel.totalDist || 4000;
                if (y < canvas.height - 150) {
                    if (isEditorDragging) return;
                    if (y < canvas.height - 150) {
                        let clickDist = editorScroll + y - 150;
                        let snapX = Math.round(x / GRID) * GRID;
                        // グリッドスナップ
                        clickDist = Math.round(clickDist / GRID) * GRID;
                        
                        let foundIdx = -1;
                        for(let i=0; i<editorLevel.objects.length; i++){
                            let o = editorLevel.objects[i];
                            if (Math.abs(o.d - clickDist) < 15 && snapX >= o.x && snapX <= o.x + o.w) {
                                foundIdx = i; break;
                            }
                        }
                        if (foundIdx !== -1) {
                            editorSelectedIndex = foundIdx;
                        } else {
                            if (editorSelectedIndex !== -1 && x < canvas.width - 245) {
                                editorSelectedIndex = -1;
                            } else if (editorSelectedIndex === -1) {
                                if (editorSelectedType === 'start') {
                                    editorLevel.startX = snapX - 15;
                                    editorLevel.startDist = clickDist;
                                } else {
                                    let ow = 60, oh = 20;
                                    if (editorSelectedType === 'laser') { ow = canvas.width; snapX = 0; oh = 20; }
                                    else if (editorSelectedType === 'item') {
                                        ow = 20; oh = 20;
                                        let itemCount = editorLevel.objects.filter(o => o.type === 'item').length;
                                        if (itemCount >= 3) { alert("星は最大3枚までです！"); return; }
                                    } else if (editorSelectedType === 'goal') { ow = 100; oh = 20; snapX = (canvas.width-ow)/2; }
                                    else if (editorSelectedType === 'fireball') { ow = 40; oh = 40; }
                                    editorLevel.objects.push({
                                        d: clickDist, x: snapX, y: 0, w: ow, h: oh, 
                                        type: editorSelectedType, rotation: 0,
                                        color: (editorSelectedType === 'item' ? '#F1C40F' : (editorSelectedType === 'goal' ? '#2ECC71' : (editorSelectedType === 'fireball' ? '#FF5722' : '#E74C3C'))),
                                        spawned: false
                                    });
                                    editorSelectedIndex = editorLevel.objects.length - 1;
                                }
                            }
                        }
                    }
                } else {
                    let types = ['normal', 'fast', 'moving', 'laser', 'seeker', 'fireball', 'item', 'goal', 'start', 'len+100', 'len-100', 'len+10', 'len-10'];
                    if (editorSelectedIndex !== -1 && x > canvas.width - 245 && x < canvas.width - 80) {
                        let self = editorLevel.objects[editorSelectedIndex];
                        let editX = canvas.width - 245;
                        if (y > canvas.height - 140 && y < canvas.height - 110) { // 行目 (幅)
                            if (x < editX + 45) self.w = Math.max(GRID, self.w - GRID);
                            else if (x > editX + 130) self.w = Math.min(canvas.width, self.w + GRID);
                            else editorSelectedIndex = -1; 
                        } else if (y > canvas.height - 105 && y < canvas.height - 75) { // 2行目 (高さ)
                            if (x < editX + 45) self.h = Math.max(GRID/2, self.h - GRID/2);
                            else if (x > editX + 130) self.h = Math.min(200, self.h + GRID/2);
                            else editorSelectedIndex = -1;
                        } else if (y > canvas.height - 70 && y < canvas.height - 40) { // 3行目 (回転 or 削除)
                            if (x < editX + 50) { editorLevel.objects.splice(editorSelectedIndex, 1); editorSelectedIndex = -1; }
                            else if (x > editX + 55 && x < editX + 90) { self.rotation = (self.rotation || 0) - 0.2; }
                            else if (x > editX + 135) { self.rotation = (self.rotation || 0) + 0.2; }
                            else { editorSelectedIndex = -1; }
                        }
                    } else {
                        let bgmTypes = ['pop', 'techno', 'chill'];
                        let bgNames = ['夕焼け', '青空', '宇宙', '紫暮', '猛毒', '朝焼け'];
                        for(let i=0; i<types.length; i++) {
                            let col = i % 5; let row = Math.floor(i / 5);
                            let btnX = 10 + col * 55; let btnY = canvas.height - 140 + row * 45;
                            if (x > btnX && x < btnX + 50 && y > btnY && y < btnY + 40) {
                                if (types[i] === 'len+100') { editorLevel.totalDist = (editorLevel.totalDist || 4000) + 100; playTapSound(); }
                                else if (types[i] === 'len-100') { editorLevel.totalDist = Math.max(100, (editorLevel.totalDist || 4000) - 100); playTapSound(); }
                                else if (types[i] === 'len+10') { editorLevel.totalDist = (editorLevel.totalDist || 4000) + 10; playTapSound(); }
                                else if (types[i] === 'len-10') { editorLevel.totalDist = Math.max(10, (editorLevel.totalDist || 4000) - 10); playTapSound(); }
                                else if (types[i] === 'setBGM') { 
                                    editorLevel.bgmType = ((editorLevel.bgmType || 0) + 1) % bgmTypes.length;
                                    playTapSound();
                                }
                                else if (types[i] === 'setBG') { 
                                    editorLevel.bgIdx = ((editorLevel.bgIdx || 0) + 1) % themeBgData.length;
                                    playTapSound();
                                }
                                else { editorSelectedType = types[i]; }
                                draw();
                            }
                        }
                        if (x > canvas.width - 80 && y > canvas.height - 145) {
                            if (y < canvas.height - 105) {
                                autoSaveCustomLevel();
                                startCustomLevel(JSON.parse(JSON.stringify(editorLevel)));
                            } else if (y < canvas.height - 65) {
                                autoSaveCustomLevel();
                                gameState = 'START';
                            }
                        }
                    }
                }
                draw(); return;
            } else if (gameState === 'SHOP') {
                // BACKボタン
                if (x > 10 && x < 90 && y > 10 && y < 45) {
                    playTapSound();
                    gameState = 'START';
                    draw();
                    return;
                }
                
                // 更衣室への矢印ボタン
                if (x > canvas.width - 60 && x < canvas.width - 10 && y > 10 && y < 45) {
                    playTapSound();
                    gameState = 'CHANGING_ROOM';
                    shopTab = 0; // 更衣室もタブ0から
                    draw();
                    return;
                }

                // タブ切り替え判定
                if (y > 70 && y < 110) {
                    let tabsCount = isHandsomeEyesUnlocked ? 5 : 4;
                    let tabW = (canvas.width - 40) / tabsCount;
                    for (let t = 0; t < tabsCount; t++) {
                        if (x > 20 + t * tabW && x < 20 + (t+1) * tabW) {
                            playTapSound();
                            shopTab = t;
                            draw();
                            return;
                        }
                    }
                }
                
                // アイテムリストのクリック判定
                let currentItems = shopPages[shopTab];
                if (!currentItems && shopTab === 4) {
                    // 特別タブ: 目
                    let bX = 20; let bY = 120; let bW = 125; let bH = 50;
                    if (x > bX && x < bX + bW && y > bY && y < bY + bH) {
                        playTapSound(); equippedEyes = 'handsome';
                        localStorage.setItem('superSkyDropEqEyes', equippedEyes);
                        saveShopData(); draw(); return;
                    }
                    return;
                }
                if (!currentItems) return;

                let shopColW = (canvas.width - 30) / 2;
                for (let i = 0; i < currentItems.length; i++) {
                    let item = currentItems[i];
                    let col = i % 2; let row = Math.floor(i / 2);
                    let boxX = 10 + col * (shopColW + 10);
                    let boxY = 115 + row * 75;
                    let boxW = shopColW; let boxH = 65;
                    let btnW = 60; let btnH = 26;
                    let btnX = boxX + boxW - btnW - 5;
                    let btnY = boxY + boxH - btnH - 5;

                    if (x > btnX && x < btnX + btnW && y > btnY && y < btnY + btnH) {
                        if (item.type === 'skin') {
                            if (!ownedSkins[item.id]) {
                                if (totalSilverBirds >= item.price) {
                                    playClearSound(); totalSilverBirds -= item.price;
                                    ownedSkins[item.id] = true; equippedSkin = item.id;
                                    player.color = skinColors[equippedSkin];
                                    saveShopData();
                                } else { playTapSound(); }
                            } else {
                                playTapSound(); equippedSkin = item.id;
                                player.color = skinColors[equippedSkin];
                                saveShopData();
                            }
                        } else if (item.type === 'mantle') {
                            if (!ownedMantles[item.id]) {
                                if (totalSilverBirds >= item.price) {
                                    playClearSound(); totalSilverBirds -= item.price;
                                    ownedMantles[item.id] = true; equippedMantle = item.id;
                                    saveShopData();
                                } else { playTapSound(); }
                            } else {
                                playTapSound(); equippedMantle = item.id;
                                saveShopData();
                            }
                        } else if (item.type === 'shape') {
                            if (!ownedShapes[item.id]) {
                                if (totalSilverBirds >= item.price) {
                                    playClearSound(); totalSilverBirds -= item.price;
                                    ownedShapes[item.id] = true; equippedShape = item.id;
                                    saveShopData();
                                } else { playTapSound(); }
                            } else {
                                playTapSound(); equippedShape = item.id;
                                saveShopData();
                            }
                        } else if (item.type === 'boost') {
                            if (coinBoostMultiplier <= 1) {
                                if (totalSilverBirds >= item.price) {
                                    playClearSound(); totalSilverBirds -= item.price;
                                    coinBoostMultiplier = (item.id === 'boost_large') ? 1.3 : 1.2;
                                    saveShopData();
                                } else { playTapSound(); }
                            }
                        } else if (item.type === 'chapter') {
                            let totalStars = getTotalGoldStars();
                            let reqStars = (item.id === 'ch2' ? 30 : 70);
                            let alreadyBought = (item.id === 'ch2' ? isChapter2Bought : isChapter3Bought);
                            if (alreadyBought) {
                                alert("すでにこの章は解禁されています！");
                            } else if (totalStars < reqStars) {
                                alert(`解禁には ${reqStars} 個のスターが必要です！（現在：${totalStars} 個）`);
                            } else {
                                if (confirm(`★ ${reqStars} 個を達成しました！${item.name}を解禁しますか？`)) {
                                    playClearSound(); 
                                    spentStars += reqStars; // スターを消費する
                                    if (item.id === 'ch2') {
                                        isChapter2Bought = true;
                                        localStorage.setItem('superSkyDropChapter2Unlocked', 'true');
                                    } else {
                                        isChapter3Bought = true;
                                        localStorage.setItem('superSkyDropChapter3Unlocked', 'true');
                                    }
                                    saveShopData();
                                }
                            }
                        } else if (item.type === 'eyes') {
                            if (isHandsomeEyesUnlocked) {
                                playTapSound(); equippedEyes = item.id;
                                saveShopData();
                            }
                        }
                        draw(); return;
                    }
                }
            } else if (gameState === 'CHANGING_ROOM') {
                // SHOPへ戻る
                if (x > 10 && x < 120 && y > 10 && y < 45) {
                    playTapSound();
                    gameState = 'SHOP';
                    shopTab = 0;
                    draw();
                    return;
                }

                // タブ切り替え判定 (更衣室は顔も追加で4つ)
                if (y > 70 && y < 110) {
                    let tabW = (canvas.width - 40) / 4;
                    for (let t = 0; t < 4; t++) {
                        let actualTab = (t === 3) ? 4 : t; // その他(3)を飛ばして 顔(4) にマッピング
                        if (x > 20 + t * tabW && x < 20 + (t+1) * tabW) {
                            playTapSound();
                            shopTab = actualTab;
                            draw();
                            return;
                        }
                    }
                }

                if (shopTab === 0) {
                    // スキン
                    let skinIds = Object.keys(skinColors);
                    for (let i = 0; i < skinIds.length; i++) {
                        let skinId = skinIds[i];
                        if (!ownedSkins[skinId]) continue;
                        let col = i % 2; let row = Math.floor(i / 2);
                        let bX = 20 + col * 135; let bY = 120 + row * 60; let bW = 125; let bH = 50;
                        if (x > bX && x < bX + bW && y > bY && y < bY + bH) {
                            playTapSound(); equippedSkin = skinId;
                            player.color = skinColors[equippedSkin];
                            saveShopData(); draw(); return;
                        }
                    }
                } else if (shopTab === 1) {
                    // マント
                    let mantleIds = Object.keys(mantleColors);
                    for (let i = 0; i < mantleIds.length; i++) {
                        let mId = mantleIds[i];
                        if (!ownedMantles[mId]) continue;
                        let col = i % 2; let row = Math.floor(i / 2);
                        let bX = 20 + col * 135; let bY = 120 + row * 60; let bW = 125; let bH = 50;
                        if (x > bX && x < bX + bW && y > bY && y < bY + bH) {
                            playTapSound(); equippedMantle = mId;
                            saveShopData(); draw(); return;
                        }
                    }
                } else if (shopTab === 2) {
                    // 形
                    let sIds = Object.keys(playerShapes);
                    for (let i = 0; i < sIds.length; i++) {
                        let sId = sIds[i];
                        if (!ownedShapes[sId]) continue;
                        let col = i % 2; let row = Math.floor(i / 2);
                        let bX = 20 + col * 135; let bY = 120 + row * 60; let bW = 125; let bH = 50;
                        if (x > bX && x < bX + bW && y > bY && y < bY + bH) {
                            playTapSound(); equippedShape = sId;
                            saveShopData(); draw(); return;
                        }
                    }
                }
            } else if (gameState === 'SETTINGS') {
                // BACKボタン
                if (x > 10 && x < 90 && y > 10 && y < 45) {
                    playTapSound();
                    gameState = 'START';
                    draw();
                    return;
                }

                // BGM変更オプション
                let options = ['pop', 'techno', 'chill'];
                for (let i = 0; i < options.length; i++) {
                    let btnY = 140 + i * 75;
                    if (x > 50 && x < canvas.width - 50 && y > btnY && y < btnY + 55) {
                        playTapSound();
                        currentBGMType = options[i];
                        savePlayerData();
                        stopLevelSelectBGM();
                        playLevelSelectBGM();
                        draw();
                        return;
                    }
                }

                // 強制的な更新ボタン (キャッシュクリア) - タイトル「設定」よりも上に配置
                let updateBtnX = canvas.width / 2 - 80;
                let updateBtnY = 40; 
                let updateBtnW = 160;
                let updateBtnH = 35;
                if (x > updateBtnX && x < updateBtnX + updateBtnW && y > updateBtnY && y < updateBtnY + updateBtnH) {
                    playTapSound();
                    const v = Date.now();
                    location.href = location.pathname + '?v=' + v;
                    return;
                }
                
                
                // BGMセレクト
                for (let i = 0; i < bgmOptions.length; i++) {
                    let btnY = 180 + i * 62;
                    let btnH = 55;
                    if (x > 50 && x < canvas.width - 50 && y > btnY && y < btnY + btnH) {
                        playTapSound();
                        currentBGMType = bgmOptions[i].id;
                        localStorage.setItem('superSkyDropBGMType', currentBGMType);
                        stopLevelSelectBGM();
                        playLevelSelectBGM();
                        draw();
                        return;
                    }
                }
                
                // スローモード設定
                let btnY = 400;
                let btnW = 50;
                let btnH = 40;
                if (x > canvas.width / 2 - 80 && x < canvas.width / 2 - 30 && y > btnY && y < btnY + btnH) {
                    playTapSound();
                    slowModeStrength = Math.max(0.1, Math.round((slowModeStrength - 0.1) * 10) / 10);
                    localStorage.setItem('superSkyDropSlowStrength', slowModeStrength);
                    draw(); return;
                }
                if (x > canvas.width / 2 + 30 && x < canvas.width / 2 + 80 && y > btnY && y < btnY + btnH) {
                    playTapSound();
                    slowModeStrength = Math.min(2.0, Math.round((slowModeStrength + 0.1) * 10) / 10);
                    localStorage.setItem('superSkyDropSlowStrength', slowModeStrength);
                    draw(); return;
                }

                // トグル設定
                for (let i = 0; i < toggleList.length; i++) {
                    let col = i % 4; let row = Math.floor(i / 4);
                    let bW = 85; let bH = 35;
                    let bX = 15 + col * 95; let bY = 460 + row * 45;
                    if (x > bX && x < bX + bW && y > bY && y < bY + bH) {
                        playTapSound();
                        if (i === 0) isSEEnabled = !isSEEnabled;
                        if (i === 1) { isIngameBGMEnabled = !isIngameBGMEnabled; if (!isIngameBGMEnabled) stopIngameBGM(); }
                        if (i === 2) { isWindEnabled = !isWindEnabled; if (!isWindEnabled) stopIngameWind(); }
                        if (i === 3) isTiltEnabled = !isTiltEnabled;
                        if (i === 4) isParticlesEnabled = !isParticlesEnabled;
                        if (i === 5) isIntroEnabled = !isIntroEnabled;
                        if (i === 6) isShadowsEnabled = !isShadowsEnabled;
                        if (i === 7) isDebugHitboxEnabled = !isDebugHitboxEnabled;
                        savePlayerData(); draw(); return;
                    }
                }
            } else if (gameState === 'TUTORIAL') {
                if (x > canvas.width/2 - 80 && x < canvas.width/2 + 80 && y > canvas.height - 100 && y < canvas.height - 50) {
                    playTapSound();
                    gameState = 'LEVEL_SELECT'; playLevelSelectBGM(); draw(); return;
                }
            } else if (gameState === 'CLEAR' || gameState === 'PLAYING' || gameState === 'GAMEOVER') {
                // 自作ステージ時の左上「エディターに戻る」ボタン
                if (isCustomLevel && x < 110 && y < 100) {
                    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
                    stopAllSounds(); playTapSound();
                    autoSaveCustomLevel(); // プレイ中・終了時も一応セーブを確認
                    gameState = 'EDITOR';
                    draw();
                    return;
                }
                
                if (gameState === 'GAMEOVER') {
                    // スマホ用リトライボタン (エンドレス以外のみ表示・動作)
                    if (!isEndlessMode && x > canvas.width / 2 - 50 && x < canvas.width / 2 + 50 && y > canvas.height / 2 + 150 && y < canvas.height / 2 + 185) {
                        playTapSound(); resetGame(); return;
                    }

                    // エンドレスモード時のランキングボタン判定
                    if (isEndlessMode) {
                        let btnW = 160; let btnH = 40;
                        let btnX = canvas.width / 2 - btnW / 2;
                        let btnY = canvas.height / 2 + 140;
                        if (x > btnX && x < btnX + btnW && y > btnY && y < btnY + btnH) {
                            playTapSound();
                            gameState = 'RANKING';
                            fetchRanking();
                            draw();
                            return;
                        }
                    }
                }
                
                if (gameState === 'PLAYING') {
                    // スマホ用もどるボタン（右上）
                    if (x > canvas.width - 70 && y < 50) {
                        playTapSound(); stopAllSounds(); gameState = 'START'; draw(); return;
                    }
                    // プレイ中の他の場所のクリックは何もしない
                    return;
                }
                if (countdownInterval) {
                   clearInterval(countdownInterval);
                   countdownInterval = null;
                }
                if (gameState === 'CLEAR') {
                    playTapSound();
                    isEndlessMode = false;
                    if (isCustomLevel) {
                        gameState = 'CUSTOM_LEVEL_SELECT';
                    } else {
                        gameState = 'LEVEL_SELECT';
                    }
                    playLevelSelectBGM();
                    draw();
                    return;
                }
                
                playTapSound();
                let wasEndless = isEndlessMode; 
                isEndlessMode = false; // エンドレスを解除
                
                if (!wasEndless && !isCustomLevel) {
                    gameState = 'LEVEL_SELECT'; // 通常ステージなら選択画面に戻る
                } else if (isCustomLevel) {
                    gameState = 'CUSTOM_LEVEL_SELECT'; // 自作ステージならリストに戻る
                } else {
                    gameState = 'START'; // その他（エンドレス等）はタイトルに戻る
                }
                
                playLevelSelectBGM();
                draw();
                return;
            } else if (gameState === 'LEVEL_SELECT') {
                isEndlessMode = false;
                isSecretStage = false;
                // BACKボタン (左上の三角)
                if (x > 5 && x < 50 && y > 5 && y < 55) {
                    playTapSound();
                    gameState = 'START';
                    draw();
                    return;
                }

                let btnW = 180;
                let btnH = 120;
                let btnX = canvas.width/2 - btnW/2;
                let btnY = canvas.height/2 - 50;

                // 左の三角 (前へ)
                if (x > 10 && x < 60 && y > btnY && y < btnY + btnH) {
                    playTapSound();
                    if (currentChapter === 4) {
                        currentLevelIndex = 60; // 1つしかないのでそのまま
                    } else {
                        let startIdx = (currentChapter - 1) * 20;
                        currentLevelIndex = startIdx + ((currentLevelIndex - startIdx - 1 + 20) % 20);
                    }
                    draw();
                    return;
                }

                // 右の三角 (次へ)
                if (x > canvas.width - 60 && x < canvas.width - 10 && y > btnY && y < btnY + btnH) {
                    playTapSound();
                    if (currentChapter === 4) {
                        currentLevelIndex = 60; // 1つしかないのでそのまま
                    } else {
                        let startIdx = (currentChapter - 1) * 20;
                        currentLevelIndex = startIdx + ((currentLevelIndex - startIdx + 1) % 20);
                    }
                    draw();
                    return;
                }

                // 章切り替えボタン (中央寄せ対応)
                if (y > 140 && y < 185) {
                    let allCleared = false; try { allCleared = isAllLevelsCleared(); } catch(e){}
                    let numTabs = allCleared ? 4 : 3;
                    let tabW = 88; let tabG = 8;
                    let totalW = numTabs * tabW + (numTabs - 1) * tabG;
                    let startX = (canvas.width - totalW) / 2;

                    for (let i = 0; i < numTabs; i++) {
                        let tx1 = startX + i * (tabW + tabG);
                        let tx2 = tx1 + tabW;
                        if (x > tx1 && x < tx2) {
                            if (i === 0 && currentChapter !== 1) {
                                currentChapter = 1; currentLevelIndex = 0; playTapSound(); draw(); return;
                            } else if (i === 1 && currentChapter !== 2) {
                                if (isChapter2Bought) {
                                    currentChapter = 2; currentLevelIndex = 20; playTapSound(); draw(); return;
                                } else { alert("第2章はロックされています。ショップで購入してください！"); return; }
                            } else if (i === 2 && currentChapter !== 3) {
                                if (isChapter3Bought) {
                                    currentChapter = 3; currentLevelIndex = 40; playTapSound(); draw(); return;
                                } else { alert("第3章はロックされています。ショップで購入してください！"); return; }
                            } else if (i === 3 && currentChapter !== 4) {
                                currentChapter = 4; currentLevelIndex = 60; playTapSound(); draw(); return;
                            }
                        }
                    }
                }

                // 中央のレベル決定
                if (x > btnX && x < btnX + btnW && y > btnY && y < btnY + btnH) {
                    playTapSound();
                    selectLevel(currentLevelIndex);
                    return;
                }
            } else if (gameState === 'CUSTOM_LEVEL_SELECT') {
                // BACKボタン
                if (x > 10 && x < 90 && y > 10 && y < 45) {
                    playTapSound(); gameState = 'START'; draw(); return;
                }
                // ステージ選択 (3列リスト)
                let itemW = 110; let itemH = 60;
                for (let i = 0; i < customLevels.length; i++) {
                    let col = i % 3; let row = Math.floor(i / 3);
                    let bx = 25 + col * (itemW + 15); let by = 80 + row * (itemH + 15);
                    if (x > bx && x < bx + itemW && y > by && y < by + itemH) {
                        playTapSound();
                        selectedCustomIdx = i;
                        gameState = 'CUSTOM_ACTION_MENU';
                        draw();
                        return;
                    }
                }
            } else if (gameState === 'CUSTOM_ACTION_MENU') {
                let btnW = 200; let btnH = 60;
                let centerX = canvas.width / 2 - btnW / 2;
                
                // 遊ぶ
                if (x > centerX && x < centerX + btnW && y > 150 && y < 150 + btnH) {
                    playTapSound();
                    isCustomLevel = true;
                    customLevelData = customLevels[selectedCustomIdx];
                    editorLevel = customLevelData;
                    resetGame();
                }
                // 編集
                else if (x > centerX && x < centerX + btnW && y > 230 && y < 230 + btnH) {
                    playTapSound();
                    editorLevel = JSON.parse(JSON.stringify(customLevels[selectedCustomIdx]));
                    editingCustomIndex = selectedCustomIdx;
                    editorScroll = 0;
                    gameState = 'EDITOR';
                    draw();
                }
                // 削除
                else if (x > centerX && x < centerX + btnW && y > 310 && y < 310 + btnH) {
                    if (confirm("このステージを削除してもよろしいですか？")) {
                        customLevels.splice(selectedCustomIdx, 1);
                        localStorage.setItem('superSkyDropCustom', JSON.stringify(customLevels));
                        playTapSound();
                        gameState = 'CUSTOM_LEVEL_SELECT';
                        draw();
                    }
                }
                // もどる
                else if (x > centerX && x < centerX + btnW && y > 390 && y < 390 + btnH) {
                    playTapSound();
                    gameState = 'CUSTOM_LEVEL_SELECT';
                    draw();
                }
            }
        }

        function selectLevel(index) {
            currentLevelIndex = index;
            isCustomLevel = false;
            if (index === 60) { // 裏ステージ
                isSecretStage = true;
                baseSpeedMultiplier = 1.0; // 裏ステージは固定速度
                obsSpawnRate = 0.06; // 裏ステージの出現率
            } else {
                isSecretStage = false;
                baseSpeedMultiplier = levels[index].speed;
                obsSpawnRate = levels[index].rate;
            }
            resetGame();
        }

        function triggerGameOver() {
            if (gameState === 'GAMEOVER') return; 
            gameState = 'GAMEOVER';
            gameOverTime = Date.now(); // 時刻を記録
            stopAllSounds();
            
            // ハイスコアチェック
            checkHighScore();

            // エンドレスモードの場合は自動リトライ（カウントダウン後のresetGame）を行わない
            if (isEndlessMode || isSecretStage) {
                if (isEndlessMode) {
                    lastEndlessPlayTime = Date.now();
                    localStorage.setItem('superSkyDropLastEndlessPlayTime', lastEndlessPlayTime);
                    // エンドレスモード終了時にスコアを送信
                    sendScore(playerName, Math.floor(endlessTime * 10) / 10);
                }
                retryCountdown = 0; 
                return;
            }

            retryCountdown = 3;
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                retryCountdown--;
                if (retryCountdown <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    if (gameState === 'GAMEOVER') {
                        resetGame();
                    }
                }
            }, 1000);
        }

        function startEndlessMode() {
            isEndlessMode = true;
            isSecretStage = false;
            isCustomLevel = false;
            isSlowMode = false; // エンドレスでは絶対にスロー禁止
            currentLevelIndex = 0; 
            obsSpawnRate = levels[0].rate; 
            resetGame();
        }

        function startSecretStage() {
            isSecretStage = true;
            isEndlessMode = false;
            isCustomLevel = false;
            currentLevelIndex = 0; 
            obsSpawnRate = 0.06; 
            baseSpeedMultiplier = 0.7; 
            resetGame();
        }

        function autoSaveCustomLevel() {
            if (editorLevel.objects.length === 0 && editorLevel.totalDist === 4000) return; 
            let newSave = JSON.parse(JSON.stringify(editorLevel));
            if (editingCustomIndex !== -1) {
                // 編集中のステージを更新
                customLevels[editingCustomIndex] = newSave;
            } else {
                // 新規ステージとして追加
                newSave.name = `STAGE ${customLevels.length + 1}`;
