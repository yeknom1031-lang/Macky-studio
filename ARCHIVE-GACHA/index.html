<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>画像ガチャ図鑑</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-grid"></div>

  <main id="appRoot" class="app" data-mobile-view="gacha">
    <header class="topbar">
      <div>
        <p class="badge">あたらしいゲーム</p>
        <h1>画像ガチャ図鑑</h1>
        <p class="subtitle">集めた画像を全部使ったガチャ図鑑</p>
      </div>
      <div class="topbar-actions">
        <button id="bgmBtn" class="ghost-btn bgm-btn active" type="button">BGM ON</button>
        <button id="resetBtn" class="ghost-btn" type="button">データ初期化</button>
      </div>
    </header>

    <section class="stats" aria-label="ステータス">
      <article>
        <h2>総ガチャ数</h2>
        <p id="pullsText">0</p>
      </article>
      <article>
        <h2>図鑑達成</h2>
        <p id="progressText">0 / 0</p>
      </article>
      <article>
        <h2>本日のガチャ</h2>
        <p id="dailyText">未実行</p>
      </article>
    </section>

    <section class="play-area">
      <div class="result-panel">
        <p class="result-tag">最新の結果</p>
        <div id="resultCard" class="result-card">
          <img id="resultImage" alt="ガチャ結果画像">
          <div class="result-info">
            <p id="resultRarity">---</p>
            <h3 id="resultName">ボタンを押してガチャ！</h3>
            <p id="resultSeries">画像カード</p>
          </div>
        </div>
        <div class="pull-buttons">
          <button id="pullBtn" class="main-btn" type="button">ガチャ</button>
        </div>
        <p id="messageText" class="message"></p>
      </div>

      <aside class="history-panel">
        <h2>最近の結果</h2>
        <ul id="historyList"></ul>
      </aside>
    </section>

    <section class="collection">
      <div class="section-title">
        <h2>カード図鑑</h2>
        <p>毎日1回ガチャして、図鑑を埋めよう</p>
      </div>
      <div id="collectionGrid" class="collection-grid"></div>
    </section>
  </main>

  <nav class="mobile-tabs" aria-label="画面切り替え">
    <div class="mobile-tabs-inner" role="tablist" aria-label="メインメニュー">
      <button
        type="button"
        class="mobile-tab-btn active"
        data-mobile-tab="gacha"
        role="tab"
        aria-selected="true"
      >
        ガチャ
      </button>
      <button
        type="button"
        class="mobile-tab-btn"
        data-mobile-tab="collection"
        role="tab"
        aria-selected="false"
      >
        図鑑
      </button>
    </div>
  </nav>

  <div id="cinematicOverlay" class="cinematic-overlay" aria-hidden="true">
    <div class="cinematic-core">
      <p id="cineLabel" class="cine-label">演出準備中</p>
      <h2 id="cinePhase" class="cine-phase">エネルギー充填</h2>
      <div id="doorStage" class="door-stage" aria-hidden="true">
        <div class="door-frame"></div>
        <div class="door-beam"></div>
        <div class="door-seam"></div>
        <div class="door-panel door-left"><span class="panel-detail"></span></div>
        <div class="door-panel door-right"><span class="panel-detail"></span></div>
        <div class="door-lock"></div>
      </div>
      <div class="cine-bar">
        <span id="cineBarFill"></span>
      </div>
      <p class="cine-note">封印扉 開門シーケンス</p>
    </div>
  </div>

  <script src="cards-data.js"></script>
  <script src="game.js"></script>
</body>
</html>
