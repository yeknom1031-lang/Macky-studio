<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dash - Geometry Dash Style Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-overlay">
            <div id="start-screen" class="overlay-content">
                <h1 class="game-title">NEON DASH</h1>
                <p class="game-subtitle">リズムに合わせてジャンプ！</p>
                <button id="start-button">START GAME</button>
                <div class="controls-hint">
                    <p>操作方法: スペースキー または クリック</p>
                </div>
            </div>

            <div id="game-info" class="hidden">
                <div class="score-container">
                    <span class="score-label">PROGRESS:</span>
                    <span id="score-value">0%</span>
                </div>
                <div id="progress-bar-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div id="death-screen" class="overlay-content hidden">
                <h2 class="death-title">CRASHED!</h2>
                <p id="final-progress">記録: 0%</p>
                <button id="restart-button">RETRY</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
