<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TSUMIKI TOWER 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app">
    <canvas id="game-canvas"></canvas>

    <section id="hud">
      <div class="hud-card">
        <p class="hud-label">高さ</p>
        <p class="hud-value"><span id="hud-height">0.00</span>m</p>
      </div>
      <div class="hud-card">
        <p class="hud-label">設置数</p>
        <p class="hud-value"><span id="hud-blocks">0</span></p>
      </div>
      <div class="hud-card">
        <p class="hud-label">連続安定</p>
        <p class="hud-value"><span id="hud-stable">0.0</span>s</p>
      </div>
      <div class="hud-card">
        <p class="hud-label">ハイスコア</p>
        <p class="hud-value"><span id="hud-best">0.00</span>m</p>
      </div>
      <div id="next-panel" class="hud-card">
        <p class="hud-label">次の積み木</p>
        <div id="next-block"></div>
        <p id="next-label">-</p>
      </div>
    </section>

    <section id="mobile-controls" aria-label="モバイル操作">
      <button id="rotate-left" type="button">⟲</button>
      <button id="drop-button" type="button">DROP</button>
      <button id="rotate-right" type="button">⟳</button>
    </section>

    <section id="start-screen" class="overlay active" aria-live="polite">
      <div class="overlay-card">
        <h1>TSUMIKI TOWER 3D</h1>
        <p>多形状の積み木をドラッグして重ね、塔の高さを伸ばそう。</p>
        <ul>
          <li>PC: ドラッグで位置調整、Q/Eで回転、マウスを離してドロップ</li>
          <li>Mobile: タッチで位置調整、回転ボタンとDROPで配置</li>
          <li>崩壊するとゲーム終了。どこまで高く積める？</li>
        </ul>
        <button id="start-button" type="button">ゲーム開始</button>
      </div>
    </section>

    <section id="gameover-screen" class="overlay" aria-live="polite">
      <div class="overlay-card">
        <h2>GAME OVER</h2>
        <p>到達高さ: <span id="final-height">0.00</span>m</p>
        <p>設置数: <span id="final-blocks">0</span></p>
        <p id="best-status">ハイスコア更新ならず</p>
        <button id="restart-button" type="button">もう一度</button>
      </div>
    </section>
  </main>

  <script src="vendor/three.min.js" defer></script>
  <script src="vendor/cannon.min.js" defer></script>
  <script src="game.js?v=4" defer></script>
</body>
</html>
